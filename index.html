<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FISHBALL 3vs3 - Gamepad & Symmetry</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; width: 100%; touch-action: none; }
        #game-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 5px; }
        canvas { border: 5px solid #222; background-color: #2e7d32; max-width: 100%; max-height: 100%; object-fit: contain; }
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(5px); }
        .lobby-box { background: #222; padding: 20px; border-radius: 20px; border: 1px solid #444; text-align: center; width: 95%; max-width: 850px; max-height: 95vh; overflow-y: auto; }
        .team-settings { display: flex; gap: 15px; margin-top: 15px; }
        .team-box { background: #333; padding: 15px; border-radius: 12px; flex: 1; border: 1px solid #444; }
        .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(18px, 1fr)); gap: 3px; margin: 8px 0; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        .label-sm { font-size: 0.65em; font-weight: bold; color: #aaa; margin-top: 10px; text-transform: uppercase; text-align: left; }
        .pattern-select { width: 100%; background: #444; color: white; border: 1px solid #666; border-radius: 4px; padding: 4px; margin-top: 5px; font-size: 0.8em; }
        .player-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .p-slot { background: #1a1a1a; padding: 8px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85em; color: #555; }
        .p-slot.active { color: #4CAF50; border: 1px solid #4CAF50; }
        #start-btn { background: #4CAF50; color: white; border: none; padding: 12px 40px; font-size: 1.1em; cursor: pointer; border-radius: 30px; display: none; font-weight: bold; }
        #fs-btn { background: #444; color: white; border: none; padding: 12px 20px; font-size: 1em; cursor: pointer; border-radius: 30px; font-weight: bold; }
        .score-container { position: absolute; bottom: 20px; right: 30px; font-size: 3em; font-weight: 900; pointer-events: none; z-index: 5; text-shadow: 3px 3px black; font-family: monospace; }
        .link-display { background: #111; padding: 12px; border-radius: 8px; border: 1px dashed #4CAF50; margin: 10px 0; cursor: pointer; font-size: 0.85em; color: #4CAF50; word-break: break-all; }
        #copy-toast { position: fixed; top: 20px; background: #4CAF50; color: white; padding: 12px 24px; border-radius: 50px; display: none; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

    <div id="copy-toast">Link copiato! 📋</div>
    <div id="menu-overlay">
        <div class="lobby-box">
            <h2 style="margin:0 0 10px 0; color:#4CAF50;">FISHBALL 3vs3</h2>
            <div id="link-container"></div>
            
            <div class="team-settings" id="host-controls" style="display:none;">
                <div class="team-box">
                    <div style="color:#FF3D00; font-weight:bold;">TEAM 1</div>
                    <div class="label-sm">Base</div><div class="color-grid" id="picker-t1-c1"></div>
                    <div class="label-sm">Pattern</div><div class="color-grid" id="picker-t1-c2"></div>
                    <select class="pattern-select" onchange="teamStyles[0].pattern=this.value; syncLobby();">
                        <option value="solid">Tinta Unita</option>
                        <option value="v-stripes">Fasce Verticali</option>
                        <option value="h-stripes">Fasce Orizzontali</option>
                    </select>
                    <div class="label-sm">Numero</div><div class="color-grid" id="picker-t1-num"></div>
                </div>
                <div class="team-box">
                    <div style="color:#2979FF; font-weight:bold;">TEAM 2</div>
                    <div class="label-sm">Base</div><div class="color-grid" id="picker-t2-c1"></div>
                    <div class="label-sm">Pattern</div><div class="color-grid" id="picker-t2-c2"></div>
                    <select class="pattern-select" onchange="teamStyles[1].pattern=this.value; syncLobby();">
                        <option value="solid">Tinta Unita</option>
                        <option value="v-stripes">Fasce Verticali</option>
                        <option value="h-stripes">Fasce Orizzontali</option>
                    </select>
                    <div class="label-sm">Numero</div><div class="color-grid" id="picker-t2-num"></div>
                </div>
            </div>

            <div class="player-status-grid" id="player-grid"></div>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
                <button id="fs-btn" onclick="toggleFullScreen()">FULLSCREEN ⛶</button>
                <button id="start-btn" onclick="startGame()">GIOCA ORA</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="live-score" class="score-container">0 - 0</div>
        <canvas id="gameCanvas" width="956" height="654"></canvas>
    </div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(v=0.12) { if(audioCtx.state==='suspended')audioCtx.resume(); const n=audioCtx.currentTime, o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(65,n); g.gain.setValueAtTime(v,n); g.gain.exponentialRampToValueAtTime(0.001,n+0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(n+0.1); }

const PALETTE = ['#FF0000','#D50000','#880E4F','#C51162','#AA00FF','#6200EA','#304FFE','#2962FF','#0091EA','#00B8D4','#00BFA5','#00C853','#64DD17','#AEEA00','#FFD600','#FFAB00','#FF6D00','#DD2C00','#8A1538','#212121','#424242','#757575','#BDBDBD','#EEEEEE','#FFFFFF'];
const W=956, H_GAME=504, OFFSET_TOP=150, TOTAL_H=654, MID_X=W/2, MID_Y_GAME=OFFSET_TOP+(H_GAME/2);

let teamStyles = [{c1:'#FF3D00', c2:'#FFFFFF', cNum:'#FFFFFF', pattern:'solid'}, {c1:'#2979FF', c2:'#FFFFFF', cNum:'#FFFFFF', pattern:'solid'}];
let players = Array.from({length: 6}, (_, i) => ({ x: -1000, y: -1000, vx: 0, vy: 0, r: 16, m: 6, kick: 0, boostEndTime: 0, boostReadyTime: 0, number: [10,7,1,9,21,99][i] }));
let ball = { x: MID_X, y: MID_Y_GAME, vx: 0, vy: 0, r: 10, m: 1 };
let score = [0, 0], goalMsg = { text: "", timer: 0 }, isGoalProcessed = false;
let connections = [], isHost = false, gameStarted = false, activeCount = 1, lastSync = 0;
let rawKeys = {}, allRemoteKeys = {};
const posts = [{x:45, y:MID_Y_GAME-65, r:5.6}, {x:45, y:MID_Y_GAME+65, r:5.6}, {x:W-45, y:MID_Y_GAME-65, r:5.6}, {x:W-45, y:MID_Y_GAME+65, r:5.6}];

const topImg = new Image(); topImg.src = 'banner.png';
let bannerOK = false; topImg.onload = () => bannerOK = true;

const peer = new Peer();
peer.on('open', id => {
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if (joinId) { isHost = false; setupGuest(peer.connect(joinId)); }
    else {
        isHost = true;
        const url = `${window.location.origin}${window.location.pathname}?join=${id}`;
        document.getElementById('link-container').innerHTML = `<div class="link-display" onclick="copyLink('${url}')">Link Invito: ${id}</div>`;
        document.getElementById('start-btn').style.display = "inline-block";
        document.getElementById('host-controls').style.display = 'flex';
        renderPickers(); buildPlayerGrid(); requestAnimationFrame(gameLoop);
    }
});

function renderPickers() { [0,1].forEach(t => { const n = t+1; renderColorGrid(`picker-t${n}-c1`, t, 'c1'); renderColorGrid(`picker-t${n}-c2`, t, 'c2'); renderColorGrid(`picker-t${n}-num`, t, 'cNum'); }); }
function renderColorGrid(id, t, prop) {
    const el = document.getElementById(id); if(!el) return; el.innerHTML = '';
    PALETTE.forEach(c => {
        const d = document.createElement('div'); d.className = 'color-dot' + (teamStyles[t][prop] === c ? ' active' : '');
        d.style.backgroundColor = c; d.onclick = () => { teamStyles[t][prop] = c; renderPickers(); syncLobby(); }; el.appendChild(d);
    });
}
function buildPlayerGrid() {
    const g=document.getElementById('player-grid'); g.innerHTML='';
    for(let i=0;i<6;i++){
        const d=document.createElement('div'); d.className='p-slot'+(i<activeCount?' active':'');
        d.innerHTML=`<span>P${i+1}</span> <span>${i<activeCount?'PRONTO':'...'}</span>`; g.appendChild(d);
    }
}
function syncLobby() { if(isHost) sendToAll({type:'lobby', styles:teamStyles, count:activeCount}); }

function setupGuest(conn) {
    conn.on('open', () => conn.send({type:'join'}));
    conn.on('data', d => {
        if(d.type==='lobby'){ teamStyles=d.styles; activeCount=d.count; buildPlayerGrid(); }
        if(d.type==='start'){ gameStarted=true; document.getElementById('menu-overlay').style.display='none'; }
        if(d.type==='sync'){ 
            ball=d.ball; score=d.score; goalMsg=d.goalMsg; activeCount=d.count;
            d.players.forEach((p,i)=>Object.assign(players[i],p));
        }
    });
    function iLoop(){ if(conn.open) conn.send({type:'input', keys:getInputs()}); requestAnimationFrame(iLoop); }
    iLoop(); requestAnimationFrame(gameLoop);
}

peer.on('connection', conn => {
    conn.on('data', d => {
        if(d.type==='join'){ connections.push(conn); activeCount=connections.length+1; buildPlayerGrid(); syncLobby(); }
        if(d.type==='input') allRemoteKeys[connections.indexOf(conn)+1] = d.keys;
    });
});

function getInputs() {
    let ax=0, ay=0, kick=rawKeys['Space'], boost=rawKeys['ShiftLeft']||rawKeys['ShiftRight'];
    
    // Supporto Joypad (PC e Mobile via Bluetooth)
    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    for (let gp of gamepads) {
        if (gp) {
            // Analogico sinistro (360 gradi)
            if (Math.abs(gp.axes[0]) > 0.1) ax = gp.axes[0];
            if (Math.abs(gp.axes[1]) > 0.1) ay = gp.axes[1];
            // Pulsante tiro (Solitamente pulsante sud/A/X)
            if (gp.buttons[0].pressed) kick = true;
            // Pulsante boost (Solitamente dorsale destro R1 o grilletto R2 o pulsante est/B/O)
            if (gp.buttons[1].pressed || gp.buttons[5].pressed || gp.buttons[7].pressed) boost = true;
        }
    }

    // Supporto tastiera (se joypad non usato)
    if (ax === 0 && ay === 0) {
        if(rawKeys['ArrowLeft']||rawKeys['KeyA'])ax--; if(rawKeys['ArrowRight']||rawKeys['KeyD'])ax++;
        if(rawKeys['ArrowUp']||rawKeys['KeyW'])ay--; if(rawKeys['ArrowDown']||rawKeys['KeyS'])ay++;
        const m=Math.sqrt(ax*ax+ay*ay); if(m>0){ax/=m; ay/=m;}
    }
    
    return { ax, ay, kick, boost };
}

function resolve(c1, c2, post=false) {
    let dx=c2.x-c1.x, dy=c2.y-c1.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<c1.r+c2.r && dist>0) {
        let nx=dx/dist, ny=dy/dist, ov=(c1.r+c2.r)-dist;
        if(post) { c2.x+=nx*ov; c2.y+=ny*ov; }
        else { c1.x-=nx*ov*0.5; c1.y-=ny*ov*0.5; c2.x+=nx*ov*0.5; c2.y+=ny*ov*0.5; }
        let dot=(c2.vx-(post?0:c1.vx))*nx+(c2.vy-(post?0:c1.vy))*ny;
        if(dot<0) { 
            let b = post ? 0.377 : 0.779; 
            let imp = -(1 + b) * dot / (1 / (post ? 100 : c1.m) + 1 / c2.m); 
            c2.vx += (imp * nx) / c2.m; c2.vy += (imp * ny) / c2.m; 
            if(!post){ c1.vx -= (imp * nx) / c1.m; c1.vy -= (imp * ny) / c1.m; }
        }
    }
}

function checkLimits(o, isBall) {
    const bounce = 0.547;
    if(o.y - o.r < OFFSET_TOP + 15) { o.vy *= -bounce; o.y = OFFSET_TOP + 15 + o.r; }
    if(o.y + o.r > TOTAL_H - 15) { o.vy *= -bounce; o.y = TOTAL_H - 15 - o.r; }
    if(o.x - o.r < 45 || o.x + o.r > W - 45) {
        if (!(o.y > MID_Y_GAME - 65 && o.y < MID_Y_GAME + 65)) {
            if (o.x - o.r < 45) { o.vx *= -bounce; o.x = 45 + o.r; }
            if (o.x + o.r > W - 45) { o.vx *= -bounce; o.x = W - 45 - o.r; }
        } else if (isBall) {
            if(!isGoalProcessed) {
                if(o.x < 25) { score[1]++; goalMsg={text:"GOAL!",timer:120}; isGoalProcessed=true; setTimeout(resetPos,1500); }
                else if(o.x > W - 25) { score[0]++; goalMsg={text:"GOAL!",timer:120}; isGoalProcessed=true; setTimeout(resetPos,1500); }
            }
        } else {
            if (o.x < 45) o.x = 45; if (o.x > W - 45) o.x = W - 45;
        }
    }
}

function resetPos() {
    isGoalProcessed=false; ball={x:MID_X, y:MID_Y_GAME, vx:0, vy:0, r:10, m:1};
    
    // Posizionamento Simmetrico dinamico
    const team1 = [];
    const team2 = [];
    for(let i=0; i<activeCount; i++) {
        if(i % 2 === 0) team1.push(i);
        else team2.push(i);
    }

    const distribute = (indices, sideX) => {
        const count = indices.length;
        indices.forEach((pIdx, posInTeam) => {
            players[pIdx].vx = 0; players[pIdx].vy = 0;
            players[pIdx].kick = 0; players[pIdx].boostEndTime = 0;
            players[pIdx].boostReadyTime = Date.now();
            players[pIdx].x = sideX;
            // Calcolo Y simmetrica: centra i giocatori verticalmente
            const spacing = H_GAME / (count + 1);
            players[pIdx].y = OFFSET_TOP + 15 + spacing * (posInTeam + 1);
        });
    };

    distribute(team1, 220);
    distribute(team2, W - 220);

    // Nascondi giocatori non attivi
    for(let i=activeCount; i<6; i++) { players[i].x = -1000; }
}

function startGame() { if(isHost){ gameStarted=true; document.getElementById('menu-overlay').style.display='none'; sendToAll({type:'start'}); resetPos(); } }
function sendToAll(d) { connections.forEach(c => c.open && c.send(d)); }

function gameLoop(t) {
    if(isHost && gameStarted) {
        const ins=[getInputs()]; for(let i=1;i<6;i++) ins[i]=allRemoteKeys[i]||{ax:0,ay:0,kick:false,boost:false};
        if(goalMsg.timer<=0) {
            players.forEach((p,i)=>{
                if(i>=activeCount) return;
                const now=Date.now(); let s=0.147, f=0.9;
                if(ins[i].boost && now>=p.boostReadyTime){ p.boostEndTime=now+200; p.boostReadyTime=now+10000; playSound(0.15); }
                if(now<p.boostEndTime){ s=0.368; f=0.86; } 
                p.vx+=ins[i].ax*s; p.vy+=ins[i].ay*s; p.vx*=f; p.vy*=f;
                p.x+=p.vx; p.y+=p.vy;
                if(ins[i].kick && p.kick===0) { 
                    let dx=ball.x-p.x, dy=ball.y-p.y, d=Math.sqrt(dx*dx+dy*dy); 
                    if(d<p.r+ball.r+8){ ball.vx=(dx/d)*4.10; ball.vy=(dy/d)*4.10; p.kick=15; playSound(0.13); } 
                }
                if(p.kick>0) p.kick--; 
                checkLimits(p,false); resolve(p,ball); posts.forEach(post=>resolve(post,p,true));
            });
            ball.x+=ball.vx; ball.y+=ball.vy; ball.vx*=0.985; ball.vy*=0.985;
            checkLimits(ball,true); posts.forEach(post=>resolve(post,ball,true));
            for(let i=0;i<activeCount;i++) for(let j=i+1;j<activeCount;j++) resolve(players[i],players[j]);
        }
        if(t-lastSync>25){ 
            sendToAll({type:'sync', ball, players: players.map(p=>({x:p.x,y:p.y,kick:p.kick,boostEndTime:p.boostEndTime,boostReadyTime:p.boostReadyTime,number:p.number})), score, goalMsg, count:activeCount}); 
            lastSync=t; 
        }
    }
    if(goalMsg.timer>0) goalMsg.timer--; draw(); requestAnimationFrame(gameLoop);
}

function draw() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    const now = Date.now(); ctx.clearRect(0,0,W,TOTAL_H);
    for(let i=0; i<9; i++) { ctx.fillStyle=(i%2===0)?"#2e7d32":"#388e3c"; ctx.fillRect(i*(W/9), OFFSET_TOP, W/9, H_GAME); }
    if(bannerOK) ctx.drawImage(topImg, 0, 0, W, OFFSET_TOP);
    ctx.strokeStyle="rgba(255,255,255,0.6)"; ctx.lineWidth=3;
    ctx.strokeRect(45, OFFSET_TOP+15, W-90, H_GAME-30);
    ctx.beginPath(); ctx.moveTo(MID_X, OFFSET_TOP+15); ctx.lineTo(MID_X, TOTAL_H-15); ctx.stroke();
    ctx.beginPath(); ctx.arc(MID_X, MID_Y_GAME, 70, 0, Math.PI*2); ctx.stroke();
    ctx.strokeRect(45, MID_Y_GAME-130, 100, 260);
    ctx.strokeRect(W-145, MID_Y_GAME-130, 100, 260);
    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.fillRect(10, MID_Y_GAME-65, 35, 130); ctx.fillRect(W-45, MID_Y_GAME-65, 35, 130);
    ctx.strokeRect(10, MID_Y_GAME-65, 35, 130); ctx.strokeRect(W-45, MID_Y_GAME-65, 35, 130);
    posts.forEach(p=>{ ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.stroke(); });
    players.forEach((p,i) => {
        if(i>=activeCount || p.x<-500) return;
        const s = teamStyles[i%2===0?0:1];
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.clip();
        ctx.fillStyle = s.c1; ctx.fill();
        ctx.fillStyle = s.c2;
        if(s.pattern==='v-stripes'){ for(let x=-p.r;x<p.r;x+=p.r/2) ctx.fillRect(x,-p.r,p.r/4,p.r*2); }
        else if(s.pattern==='h-stripes'){ for(let y=-p.r;y<p.r;y+=p.r/2) ctx.fillRect(-p.r,y,p.r*2,p.r/4); }
        ctx.restore();
        let bc = "black";
        if(now < p.boostEndTime) bc = "#FFEB3B";
        else if(p.kick > 0) bc = "white";
        else if(now < p.boostReadyTime) bc = "#444";
        ctx.strokeStyle = bc; ctx.lineWidth = 4; ctx.stroke();
        ctx.fillStyle = s.cNum; ctx.font = "bold 16px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(p.number, p.x, p.y);
    });
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fillStyle="white"; ctx.fill(); ctx.strokeStyle="black"; ctx.lineWidth=2; ctx.stroke();
    document.getElementById('live-score').innerText=`${score[0]} - ${score[1]}`;
    if(goalMsg.timer>0){ ctx.fillStyle="white"; ctx.font="bold 80px sans-serif"; ctx.textAlign="center"; ctx.fillText(goalMsg.text, MID_X, MID_Y_GAME); }
}

function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
function copyLink(t) { navigator.clipboard.writeText(t); const o = document.getElementById('copy-toast'); o.style.display='block'; setTimeout(()=>o.style.display='none',2000); }
window.addEventListener('keydown', e=>rawKeys[e.code]=true);
window.addEventListener('keyup', e=>rawKeys[e.code]=false);
</script>
</body>
</html>
