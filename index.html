<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISHBALL 3vs3 - Fixed Sync Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 5px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.5); width: 956px; height: 800px; background-color: #2e7d32; max-width: 95vw; max-height: 90vh; object-fit: contain; position: relative; }
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
        .lobby-box { background: #222; padding: 25px; border-radius: 20px; border: 1px solid #444; text-align: center; width: 550px; }
        .team-settings { display: flex; justify-content: space-around; margin: 15px 0; gap: 15px; }
        .team-box { background: #333; padding: 10px; border-radius: 12px; flex: 1; border: 1px solid #444; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 8px; justify-items: center; }
        .color-dot { width: 20px; height: 20px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 8px #fff; }
        .player-list { margin: 15px 0; background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .p-row { display: flex; align-items: center; justify-content: space-between; background: #2a2a2a; padding: 10px 15px; border-radius: 8px; border: 1px solid #333; }
        .team-btn { padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; min-width: 80px; }
        .t1-btn { background: #ff4444; color: white; }
        .t2-btn { background: #4444ff; color: white; }
        #start-btn { background: #4CAF50; color: white; border: none; padding: 12px 40px; font-size: 1.1em; cursor: pointer; border-radius: 25px; font-weight: bold; margin-top: 15px; }
        input#link-input { background: #000; color: #00ff00; border: 1px solid #444; padding: 8px; width: 90%; margin-top: 10px; cursor: pointer; border-radius: 5px; font-family: monospace; text-align: center; }
        .ui-bottom-right { position: absolute; bottom: 20px; right: 40px; text-align: right; pointer-events: none; z-index: 5; }
        #live-score { font-size: 3.5em; font-weight: 900; }
        .esc-hint { position: absolute; top: 10px; left: 10px; font-size: 0.7em; opacity: 0.5; color: white; z-index: 200; }
    </style>
</head>
<body>

    <div class="esc-hint">PREMI ESC PER LA LOBBY</div>

    <div id="menu-overlay">
        <div class="lobby-box">
            <h2 style="margin:0 0 10px 0; color:#4CAF50;">FISHBALL 3vs3</h2>
            <div id="status-text" style="font-size:0.9em; margin-bottom:10px;">Inizializzazione...</div>
            <div id="link-area"></div>
            <div class="team-settings" id="host-controls" style="display:none;">
                <div class="team-box"><small>COLORE TEAM 1</small><div class="color-grid" id="picker-t1"></div></div>
                <div class="team-box"><small>COLORE TEAM 2</small><div class="color-grid" id="picker-t2"></div></div>
            </div>
            <div class="player-list" id="player-list-container"></div>
            <button id="start-btn" style="display:none;" onclick="startGame()">GIOCA ORA</button>
        </div>
    </div>

    <div class="ui-bottom-right">
        <div id="timer-boost" style="color: #FFEB3B; font-weight:bold;">BST: READY</div>
        <div id="timer-pwr" style="color: #00FFFF; font-weight:bold;">PWR: READY</div>
        <div id="live-score">0 - 0</div>
    </div>

    <canvas id="gameCanvas" width="956" height="800"></canvas>

<script>
const PRESET_COLORS = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF', '#FFA500', '#800080', '#008000', '#800000', '#000080', '#808000', '#FFFFFF', '#808080', '#000000', '#A52A2A'];
let teamColors = [PRESET_COLORS[0], PRESET_COLORS[2]];
let playerTeams = [0, 1, 0, 1, 0, 1]; 

const W = 956, H_GAME = 600, OFFSET_TOP = 100;
const MID_X = W / 2, MID_Y_GAME = OFFSET_TOP + (H_GAME / 2);
const FIELD_MARGIN_X = 45;

let players = Array.from({length: 6}, () => ({ x: -1000, y: -1000, vx: 0, vy: 0, r: 16, m: 6, kick: 0, boostEndTime: 0, boostReadyTime: 0, pwrReadyTime: 0 }));
let botGK = { x: -1000, y: -1000, vx: 0, vy: 0, r: 16, m: 6, team: -1, active: false, targetY: MID_Y_GAME, reactionBuffer: [] }; 
let ball = { x: MID_X, y: MID_Y_GAME, vx: 0, vy: 0, r: 10, m: 1, isPowered: false };
let score = [0, 0];
let goalMsg = { text: "", timer: 0 };
let isGoalProcessed = false;
const rawKeys = {};
const posts = [{x:45, y:MID_Y_GAME-65, r:5.6}, {x:45, y:MID_Y_GAME+65, r:5.6}, {x:W-45, y:MID_Y_GAME-65, r:5.6}, {x:W-45, y:MID_Y_GAME+65, r:5.6}];

const peer = new Peer();
let connections = [], isHost = false, gameStarted = false, activeCount = 1, mySlot = 0, allRemoteKeys = {};

peer.on('open', id => {
    const joinId = new URLSearchParams(window.location.search).get('join');
    if (joinId) { 
        isHost = false; 
        const conn = peer.connect(joinId, { reliable: true }); 
        setupGuest(conn); 
        document.getElementById('status-text').innerText = "Connessione all'host...";
    } else {
        isHost = true; mySlot = 0;
        document.getElementById('status-text').innerHTML = "Link di invito:";
        document.getElementById('host-controls').style.display = 'flex';
        document.getElementById('start-btn').style.display = 'inline-block';
        document.getElementById('link-area').innerHTML = `<input type="text" id="link-input" value="${window.location.origin + window.location.pathname}?join=${id}" readonly onclick="this.select(); document.execCommand('copy');">`;
        initColorPickers(); refreshLobbyUI();
    }
    requestAnimationFrame(gameLoop);
});

peer.on('connection', conn => {
    conn.on('open', () => {
        if(connections.length < 5) {
            connections.push(conn);
            conn.send({ type: 'initSlot', slot: connections.length });
            updateLobbySync(); // Invia subito lo stato della lobby al nuovo connesso
        }
    });
    conn.on('data', data => { 
        if(data.type === 'input') { 
            const idx = connections.indexOf(conn) + 1; 
            allRemoteKeys[idx] = data.keys; 
        }
    });
});

function updateLobbySync() { 
    if(!isHost) return; 
    activeCount = connections.length + 1; 
    refreshLobbyUI(); 
    sendToAll({ type: 'lobbyUpdate', count: connections.length, colors: teamColors, teams: playerTeams, gameStarted: gameStarted }); 
}

function refreshLobbyUI() {
    const container = document.getElementById('player-list-container'); 
    container.innerHTML = '';
    for(let i=0; i<6; i++) {
        const isActive = i < activeCount;
        const row = document.createElement('div');
        row.className = `p-row ${isActive ? '' : 'inactive'}`;
        row.innerHTML = `<span><b>P${i+1}</b></span> ${isActive ? `<button class="team-btn ${playerTeams[i] === 0 ? 't1-btn' : 't2-btn'}" onclick="${isHost ? `changeTeam(${i})` : ''}">TEAM ${playerTeams[i] + 1}</button>` : '<small>VUOTO</small>'}`;
        container.appendChild(row);
    }
}

function changeTeam(idx) { playerTeams[idx] = playerTeams[idx] === 0 ? 1 : 0; updateLobbySync(); }

function setupGuest(conn) {
    conn.on('data', data => {
        if (data.type === 'initSlot') {
            mySlot = data.slot;
            document.getElementById('status-text').innerText = "In lobby (P" + (mySlot+1) + ")";
        }
        if (data.type === 'lobbyUpdate') { 
            activeCount = data.count + 1; 
            teamColors = data.colors; 
            playerTeams = data.teams; 
            refreshLobbyUI();
            if(data.gameStarted) {
                gameStarted = true;
                document.getElementById('menu-overlay').style.display = "none";
            }
        }
        if (data.type === 'start') { gameStarted = true; document.getElementById('menu-overlay').style.display = "none"; }
        if (data.type === 'backToLobby') { gameStarted = false; document.getElementById('menu-overlay').style.display = "flex"; }
        if (data.type === 'sync') { 
            ball = data.ball; 
            score = data.score; 
            botGK = data.botGK; 
            data.players.forEach((p, i) => { if(players[i]) Object.assign(players[i], p); });
            // Se riceviamo dati di gioco, nascondiamo l'overlay per sicurezza
            if(gameStarted) document.getElementById('menu-overlay').style.display = "none";
        }
        if (data.type === 'goal') { goalMsg = { text: data.text, timer: 120 }; score = data.score; }
    });
    
    function guestLoop() { 
        if(conn.open) conn.send({type:'input', keys: getKeys()}); 
        requestAnimationFrame(guestLoop); 
    }
    guestLoop();
}

function initColorPickers() {
    [1, 2].forEach(tIdx => {
        const picker = document.getElementById('picker-t' + tIdx); picker.innerHTML = '';
        PRESET_COLORS.forEach(color => {
            const dot = document.createElement('div'); dot.className = `color-dot ${teamColors[tIdx-1] === color ? 'active' : ''}`;
            dot.style.backgroundColor = color; dot.onclick = () => { teamColors[tIdx-1] = color; initColorPickers(); updateLobbySync(); };
            picker.appendChild(dot);
        });
    });
}

function getKeys() {
    let ax = 0, ay = 0;
    if (rawKeys['ArrowLeft'] || rawKeys['KeyA']) ax--; if (rawKeys['ArrowRight'] || rawKeys['KeyD']) ax++;
    if (rawKeys['ArrowUp'] || rawKeys['KeyW']) ay--; if (rawKeys['ArrowDown'] || rawKeys['KeyS']) ay++;
    if (ax !== 0 && ay !== 0) { const n = Math.sqrt(ax*ax + ay*ay); ax /= n; ay /= n; }
    return { ax, ay, kick: !!(rawKeys['Space'] || rawKeys['KeyX']), boost: !!rawKeys['ShiftLeft'], pwr: !!(rawKeys['KeyC'] || rawKeys['KeyQ']) };
}

function movePlayer(p, input) {
    if(!p || p.x < -500 || goalMsg.timer > 0) return;
    const now = Date.now(); 
    let accel = (now < p.boostEndTime) ? 0.336 : 0.162;
    if (input.boost && now >= p.boostReadyTime) { p.boostEndTime = now + 250; p.boostReadyTime = now + 10000; }
    p.vx += input.ax * accel; p.vy += input.ay * accel; p.vx *= 0.89; p.vy *= 0.89; p.x += p.vx; p.y += p.vy;
    let dx = ball.x - p.x, dy = ball.y - p.y, d = Math.sqrt(dx*dx + dy*dy);
    if (d < p.r + ball.r + 8) {
        if (input.pwr && now >= p.pwrReadyTime) { ball.vx = (dx/d)*6.0669; ball.vy = (dy/d)*6.0669; ball.isPowered = true; p.pwrReadyTime = now + 30000; }
        else if (input.kick) { ball.vx = (dx/d)*4.05; ball.vy = (dy/d)*4.05; ball.isPowered = false; p.kick = 15; }
    }
    if (p.kick > 0) p.kick--;
}

function updateBotGK() {
    if (!botGK.active || goalMsg.timer > 0) return;
    botGK.x = (botGK.team === 0) ? 45 : W - 45;
    botGK.reactionBuffer.push(ball.y);
    if(botGK.reactionBuffer.length > 15) { 
        let dY = botGK.reactionBuffer.shift();
        let isBallInHalf = (botGK.team === 0) ? ball.x < MID_X : ball.x > MID_X;
        botGK.targetY = isBallInHalf ? dY : MID_Y_GAME;
    }
    botGK.targetY = Math.max(MID_Y_GAME - 55, Math.min(MID_Y_GAME + 55, botGK.targetY));
    botGK.vy = (botGK.targetY - botGK.y) * 0.12; 
    botGK.y += botGK.vy;

    let dx = ball.x - botGK.x, dy = ball.y - botGK.y, d = Math.sqrt(dx*dx + dy*dy);
    if (d < botGK.r + ball.r) { 
        ball.vx = (dx/d) * 4.5; ball.vy = (dy/d) * 4.5; ball.isPowered = false; 
    }
}

function resolve(c1, c2, isPost = false) {
    if (!c1 || !c2 || c1.x < -500 || c2.x < -500) return;
    let dx = c2.x - c1.x, dy = c2.y - c1.y, dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < c1.r + c2.r && dist > 0) {
        let nx = dx / dist, ny = dy / dist, overlap = (c1.r + c2.r) - dist;
        if (isPost) { c2.x += nx * overlap; c2.y += ny * overlap; }
        else { c1.x -= nx * overlap * 0.5; c1.y -= ny * overlap * 0.5; c2.x += nx * overlap * 0.5; c2.y += ny * overlap * 0.5; }
        let dot = (c2.vx - (isPost ? 0 : c1.vx))*nx + (c2.vy - (isPost ? 0 : c1.vy))*ny;
        if (dot < 0) {
            let bounce = isPost ? 0.41 : 0.85; 
            let impulse = -(1 + bounce) * dot / (1/(isPost?100:c1.m) + 1/c2.m);
            c2.vx += (impulse * nx) / c2.m; c2.vy += (impulse * ny) / c2.m;
            if (!isPost) { c1.vx -= (impulse * nx) / c1.m; c1.vy -= (impulse * ny) / c1.m; }
            if(c2 === ball || c1 === ball) ball.isPowered = false;
        }
    }
}

function checkLimits(o, isBall) {
    const limitY = OFFSET_TOP + H_GAME - 15;
    if (isBall) {
        if (o.y - o.r < OFFSET_TOP + 15 || o.y + o.r > limitY) { o.vy *= -0.54; o.y = o.y < MID_Y_GAME ? OFFSET_TOP + 15 + o.r : limitY - o.r; ball.isPowered = false; }
        if (o.y > MID_Y_GAME - 65 && o.y < MID_Y_GAME + 65) { if (o.x < 15 + o.r) o.x = 15 + o.r; if (o.x > W - 15 - o.r) o.x = W - 15 - o.r; }
        else { if (o.x < FIELD_MARGIN_X + o.r || o.x > W - FIELD_MARGIN_X - o.r) { o.vx *= -0.54; o.x = o.x < MID_X ? FIELD_MARGIN_X + o.r : W - FIELD_MARGIN_X - o.r; ball.isPowered = false; } }
    } else { o.y = Math.max(OFFSET_TOP+15, Math.min(limitY, o.y)); o.x = Math.max(FIELD_MARGIN_X, Math.min(W-FIELD_MARGIN_X, o.x)); }
}

function resetPos() {
    isGoalProcessed = false; ball = { x: MID_X, y: MID_Y_GAME, vx: 0, vy: 0, r: 10, m: 1, isPowered: false };
    players.forEach(p => { p.x = -1000; p.y = -1000; p.vx = 0; p.vy = 0; });
    let t1 = [], t2 = [];
    for(let i=0; i<activeCount; i++) { if(playerTeams[i] === 0) t1.push(i); else t2.push(i); }
    t1.forEach((idx, i) => { players[idx].x = 250; players[idx].y = MID_Y_GAME + (i * 80 - (t1.length-1)*40); });
    t2.forEach((idx, i) => { players[idx].x = W-250; players[idx].y = MID_Y_GAME + (i * 80 - (t2.length-1)*40); });
    botGK.active = (t1.length !== t2.length);
    if(botGK.active) {
        botGK.team = (t1.length < t2.length) ? 0 : 1;
        botGK.x = (botGK.team === 0) ? 45 : W - 45;
        botGK.y = MID_Y_GAME; botGK.reactionBuffer = [];
    } else { botGK.x = -1000; }
}

function startGame() { 
    if(isHost){ 
        score = [0, 0]; 
        gameStarted = true; 
        document.getElementById('menu-overlay').style.display="none"; 
        resetPos(); 
        sendToAll({type:'start'}); 
    } 
}

function sendToAll(d) { connections.forEach(c => { if(c.open) c.send(d); }); }

function backToLobby() { 
    gameStarted = false; 
    document.getElementById('menu-overlay').style.display = "flex"; 
    if(isHost) { 
        sendToAll({ type: 'backToLobby' }); 
        updateLobbySync(); 
    } 
}

function gameLoop() {
    if (isHost && gameStarted) {
        if (goalMsg.timer <= 0) {
            if (!isGoalProcessed && ball.y > MID_Y_GAME - 65 && ball.y < MID_Y_GAME + 65) {
                if (ball.x < 45) { isGoalProcessed = true; score[1]++; goalMsg = {text: "GOAL!", timer:120}; sendToAll({type:'goal', text:goalMsg.text, score}); setTimeout(resetPos, 2000); }
                else if (ball.x > W - 45) { isGoalProcessed = true; score[0]++; goalMsg = {text: "GOAL!", timer:120}; sendToAll({type:'goal', text:goalMsg.text, score}); setTimeout(resetPos, 2000); }
            }
            movePlayer(players[0], getKeys());
            for(let i=1; i<activeCount; i++) if(allRemoteKeys[i]) movePlayer(players[i], allRemoteKeys[i]);
            if(botGK.active) updateBotGK();
            ball.vx *= 0.98836; ball.vy *= 0.98836; ball.x += ball.vx; ball.y += ball.vy;
            for(let i=0; i<activeCount; i++) { resolve(players[i], ball); for(let j=i+1; j<activeCount; j++) resolve(players[i], players[j]); posts.forEach(p=>resolve(p, players[i], true)); }
            if(botGK.active) { resolve(botGK, ball); for(let i=0; i<activeCount; i++) resolve(botGK, players[i]); }
            posts.forEach(p=>resolve(p, ball, true));
        }
        checkLimits(ball, true); for(let i=0; i<activeCount; i++) checkLimits(players[i], false);
        sendToAll({ type: 'sync', ball, players: players.slice(0, activeCount), score, botGK });
    }
    if (goalMsg.timer > 0) goalMsg.timer--;
    draw(); 
    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', e => { rawKeys[e.code] = true; if(e.code === 'Escape') backToLobby(); });
window.addEventListener('keyup', e => rawKeys[e.code] = false);

function draw() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    const now = Date.now(); ctx.clearRect(0,0,W,800);
    ctx.fillStyle = "#2e7d32"; ctx.fillRect(0,0,W,800);
    const sW = (W - 90) / 10;
    for(let i=0; i<10; i++) { ctx.fillStyle = (i % 2 === 0) ? "#2e7d32" : "#328536"; ctx.fillRect(45 + (i*sW), OFFSET_TOP + 15, sW, H_GAME - 30); }
    ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 3;
    ctx.strokeRect(45, OFFSET_TOP + 15, W - 90, H_GAME - 30);
    ctx.beginPath(); ctx.moveTo(MID_X, OFFSET_TOP + 15); ctx.lineTo(MID_X, OFFSET_TOP + H_GAME - 15); ctx.stroke();
    ctx.beginPath(); ctx.arc(MID_X, MID_Y_GAME, 80, 0, Math.PI*2); ctx.stroke();
    ctx.strokeRect(45, MID_Y_GAME-140, 100, 280); ctx.strokeRect(W-145, MID_Y_GAME-140, 100, 280);
    ctx.beginPath(); ctx.arc(145, MID_Y_GAME, 60, -Math.PI/2, Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(W-145, MID_Y_GAME, 60, Math.PI/2, -Math.PI/2); ctx.stroke();
    ctx.strokeStyle = "white"; ctx.lineWidth = 5;
    ctx.strokeRect(15, MID_Y_GAME-65, 30, 130); ctx.strokeRect(W-45, MID_Y_GAME-65, 30, 130);
    posts.forEach(p => { ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle="#000"; ctx.lineWidth=1; ctx.stroke(); });

    if(botGK.active && botGK.x > 0) {
        ctx.fillStyle = teamColors[botGK.team]; ctx.beginPath(); ctx.arc(botGK.x, botGK.y, botGK.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#FFF"; ctx.lineWidth = 3; ctx.stroke(); 
    }
    for(let i=0; i<activeCount; i++) {
        const p = players[i]; if (p.x < -500) continue;
        ctx.fillStyle = teamColors[playerTeams[i]]; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        ctx.lineWidth = 4; ctx.strokeStyle = (now < p.boostEndTime) ? "#FFEB3B" : (p.kick > 0 ? "#FFF" : "#000"); ctx.stroke();
        ctx.fillStyle = (i === mySlot) ? "yellow" : "white"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("P" + (i + 1), p.x, p.y - 25);
    }
    ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill(); 
    ctx.strokeStyle = ball.isPowered ? "#00FFFF" : "#000"; ctx.lineWidth = ball.isPowered ? 3 : 1; ctx.stroke();
    if (goalMsg.timer > 0) { ctx.font = "bold 70px sans-serif"; ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.fillText(goalMsg.text, MID_X, MID_Y_GAME); }
    document.getElementById('live-score').innerText = `${score[0]} - ${score[1]}`;
    const myP = players[mySlot];
    if(myP){
        const bT = Math.ceil((myP.boostReadyTime - now)/1000), pT = Math.ceil((myP.pwrReadyTime - now)/1000);
        document.getElementById('timer-boost').innerText = bT > 0 ? `BST: ${bT}s` : "BST: READY";
        document.getElementById('timer-pwr').innerText = pT > 0 ? `PWR: ${pT}s` : "PWR: READY";
    }
}
</script>
</body>
</html>
