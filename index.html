<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FISHBALL 3vs3 - Performance Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        #bgCanvas { z-index: 1; background-color: #2e7d32; border: 2px solid #222; }
        #gameCanvas { z-index: 2; }
        
        /* Stili Mobile Widescreen */
        .mobile-widescreen { width: 100vw !important; height: auto !important; aspect-ratio: 956 / 720; }
        
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(5px); }
        .lobby-box { background: #222; padding: 30px; border-radius: 20px; border: 1px solid #444; text-align: center; min-width: 450px; }
        .team-settings { display: flex; justify-content: space-around; margin: 20px 0; gap: 15px; }
        .team-box { background: #333; padding: 12px; border-radius: 12px; flex: 1; border: 1px solid #444; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; justify-items: center; }
        .color-dot { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 12px rgba(255,255,255,0.4); }
        .player-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; font-size: 0.9em; color: #666; }
        .p-slot.active { color: #4CAF50; font-weight: bold; }
        
        /* Fullscreen Button Mobile */
        #fs-btn { display: none; background: #2196F3; color: white; border: none; padding: 12px 25px; font-size: 1em; cursor: pointer; border-radius: 30px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; width: 100%; }

        #start-btn { background: #4CAF50; color: white; border: none; padding: 15px 50px; font-size: 1.2em; cursor: pointer; border-radius: 30px; display: none; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .ui-bottom-right { position: absolute; bottom: 5%; right: 5%; text-align: right; pointer-events: none; z-index: 5; font-family: monospace; }
        #live-score { font-size: 3.5em; font-weight: 900; line-height: 1; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .timer-display { font-size: 1.3em; font-weight: bold; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        input#link-input { background: #1a1a1a; color: #00ff00; border: 1px solid #333; padding: 10px; width: 90%; margin-top: 10px; cursor: pointer; border-radius: 5px; font-family: monospace; text-align: center; }
        
        #game-container:fullscreen { width: 100vw; height: 100vh; background: #000; }
        #game-container:-webkit-full-screen { width: 100vw; height: 100vh; background: #000; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="bgCanvas" width="956" height="720"></canvas>
        <canvas id="gameCanvas" width="956" height="720"></canvas>
        
        <div id="menu-overlay">
            <div class="lobby-box">
                <h1 style="margin:0; color:#4CAF50; letter-spacing: 2px;">FISHBALL 3vs3</h1>
                <div id="status-text" style="margin-bottom: 15px;">Generazione ID...</div>
                
                <button id="fs-btn" onclick="toggleFullscreen()">VAI FULLSCREEN</button>

                <div class="team-settings" id="host-controls" style="display:none;">
                    <div class="team-box">
                        <div style="font-size: 0.8em; opacity: 0.7;">SQUADRA 1</div>
                        <div class="color-grid" id="picker-t1"></div>
                    </div>
                    <div class="team-box">
                        <div style="font-size: 0.8em; opacity: 0.7;">SQUADRA 2</div>
                        <div class="color-grid" id="picker-t2"></div>
                    </div>
                </div>
                <div class="player-status-grid">
                    <div id="slot0" class="p-slot">P1 (HOST)</div> <div id="slot1" class="p-slot">P2</div>
                    <div id="slot2" class="p-slot">P3</div> <div id="slot3" class="p-slot">P4</div>
                    <div id="slot4" class="p-slot">P5</div> <div id="slot5" class="p-slot">P6</div>
                </div>
                <button id="start-btn" onclick="startGame()">GIOCA ORA</button>
            </div>
        </div>

        <div class="ui-bottom-right">
            <div id="timer-boost" class="timer-display"></div>
            <div id="timer-pwr" class="timer-display"></div>
            <div id="live-score">0 - 0</div>
        </div>
    </div>

<script>
// CONTROLLO MOBILE WIDESCREEN
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if (isMobile) {
    const canvases = document.querySelectorAll('canvas');
    canvases.forEach(c => c.classList.add('mobile-widescreen'));
    document.getElementById('fs-btn').style.display = "block";
    if (window.innerHeight > window.innerWidth) {
        alert("Ruota il telefono in orizzontale!");
    }
}

function toggleFullscreen() {
    const container = document.getElementById('game-container');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (container.requestFullscreen) { container.requestFullscreen(); }
        else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
        document.getElementById('fs-btn').innerText = "ESCI FULLSCREEN";
    } else {
        if (document.exitFullscreen) { document.exitFullscreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        document.getElementById('fs-btn').innerText = "VAI FULLSCREEN";
    }
}

document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) document.getElementById('fs-btn').innerText = "VAI FULLSCREEN";
});
document.addEventListener('webkitfullscreenchange', () => {
    if (!document.webkitFullscreenElement) document.getElementById('fs-btn').innerText = "VAI FULLSCREEN";
});

const PRESET_COLORS = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF', '#FFA500', '#800080', '#008000', '#800000', '#000080', '#808000', '#FFFFFF', '#808080', '#000000', '#A52A2A'];
let teamColors = [PRESET_COLORS[0], PRESET_COLORS[2]];
const W = 956, OFFSET_TOP = 130, TOTAL_H = 720;
const H_GAME = TOTAL_H - OFFSET_TOP - 20; 
const MID_X = W / 2, MID_Y_GAME = OFFSET_TOP + (H_GAME / 2);
const FIELD_MARGIN_X = 45;
const GOAL_SIZE_HALF = 65 * 1.05; 

let players = Array.from({length: 6}, () => ({ 
    x: -1000, y: -1000, tx: -1000, ty: -1000, 
    vx: 0, vy: 0, r: 16, m: 6, kick: 0, 
    boostEndTime: 0, boostReadyTime: 0, pwrReadyTime: 0, 
    team: 0, isPlayer: true 
}));
let trails = []; 
let ballTrails = []; 
let playerTeams = [0, 1, 0, 1, 0, 1]; 
let matchOrderT1 = [0, 2, 4];
let matchOrderT2 = [1, 3, 5];
let ball = { x: MID_X, y: MID_Y_GAME, tx: MID_X, ty: MID_Y_GAME, vx: 0, vy: 0, r: 10, m: 1, isPowered: false, isPlayer: false };
let score = [0, 0];
let goalMsg = { text: "", timer: 0 };
let isGoalProcessed = false;
const msgLib = ["GOOOOL!", "BOMBER!", "CHAPEAU!", "RETE!"];
const keys = { ax: 0, ay: 0, kick: false, boost: false, pwr: false };
let allRemoteKeys = {}; const rawKeys = {};
const posts = [{x:45, y:MID_Y_GAME-GOAL_SIZE_HALF, r:5.6}, {x:45, y:MID_Y_GAME+GOAL_SIZE_HALF, r:5.6}, {x:W-45, y:MID_Y_GAME-GOAL_SIZE_HALF, r:5.6}, {x:W-45, y:MID_Y_GAME+GOAL_SIZE_HALF, r:5.6}];

let topImage = new Image(); 
let bannerLoaded = false;
topImage.onload = () => { bannerLoaded = true; drawField(); };
topImage.src = 'banner.png';

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let lastSoundTime = 0;
function playSound(vol = 0.12) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    if (now - lastSoundTime < 0.1) return;
    lastSoundTime = now;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(65, now);
    gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(now + 0.1);
}

const peer = new Peer();
let connections = [], isHost = false, gameStarted = false, activeCount = 1, lastSync = 0, mySlot = 0;

peer.on('open', id => {
    const joinId = new URLSearchParams(window.location.search).get('join');
    if (joinId) { isHost = false; const conn = peer.connect(joinId, { reliable: true }); setupGuest(conn); }
    else { 
        isHost = true; mySlot = 0; 
        document.getElementById('status-text').innerHTML = `Link Squadra:<br><input type="text" id="link-input" value="${window.location.origin + window.location.pathname}?join=${id}" readonly onclick="this.select(); document.execCommand('copy');">`; 
        document.getElementById('slot0').classList.add('active'); 
        document.getElementById('start-btn').style.display = "inline-block"; 
        initColorPickers(); drawField(); requestAnimationFrame(gameLoop); 
    }
});

peer.on('connection', conn => {
    conn.on('data', data => { 
        if(data.type === 'join') { if (!connections.find(c => c.peer === conn.peer)) { connections.push(conn); conn.send({ type: 'initSlot', slot: connections.length }); refreshLobbyState(); } }
        if(data.type === 'input') { const idx = connections.indexOf(conn) + 1; allRemoteKeys[idx] = data.keys; }
    });
});

function refreshLobbyState() { 
    if(!isHost) return; 
    activeCount = connections.length + 1; 
    updateLobbySlots(); 
    sendToAll({ type: 'lobbyUpdate', count: connections.length, colors: teamColors, teams: playerTeams }); 
}

function updateLobbySlots() { for(let i=0; i<6; i++) { const el = document.getElementById('slot'+i); (i < activeCount) ? el.classList.add('active') : el.classList.remove('active'); } }
function sendToAll(d) { connections.forEach(c => { if(c.open) c.send(d); }); }

function setupGuest(conn) {
    conn.on('open', () => { conn.send({ type: 'join' }); document.getElementById('status-text').innerText = "In attesa dell'Host..."; });
    conn.on('data', data => {
        if (data.type === 'initSlot') mySlot = data.slot;
        if (data.type === 'lobbyUpdate') { 
            activeCount = data.count + 1; 
            teamColors = data.colors; 
            playerTeams = data.teams;
            updateLobbySlots(); 
        }
        if (data.type === 'start') { gameStarted = true; document.getElementById('menu-overlay').style.display = "none"; }
        if (data.type === 'backToLobby') { gameStarted = false; document.getElementById('menu-overlay').style.display = "flex"; }
        if (data.type === 'sync') { 
            ball.tx = data.ball.x; ball.ty = data.ball.y; ball.isPowered = data.ball.isPowered;
            score = data.score; 
            data.players.forEach((p, i) => { if(players[i]) { players[i].tx = p.x; players[i].ty = p.y; players[i].kick = p.kick; players[i].boostEndTime = p.boostEndTime; players[i].boostReadyTime = p.boostReadyTime; players[i].pwrReadyTime = p.pwrReadyTime; players[i].team = p.team; } }); 
        }
        if (data.type === 'goal') { goalMsg = { text: data.text, timer: 120 }; score = data.score; playSound(0.4); }
    });
    function inputLoop() { updateInput(); if(conn.open) conn.send({type:'input', keys}); requestAnimationFrame(inputLoop); }
    inputLoop(); requestAnimationFrame(gameLoop);
}

function initColorPickers() {
    if (!isHost) return;
    document.getElementById('host-controls').style.display = 'flex';
    [1, 2].forEach(tIdx => {
        const container = document.getElementById('picker-t' + tIdx); container.innerHTML = '';
        PRESET_COLORS.forEach(color => {
            const dot = document.createElement('div'); dot.className = 'color-dot' + (teamColors[tIdx-1] === color ? ' active' : ''); dot.style.backgroundColor = color;
            dot.onclick = () => { teamColors[tIdx-1] = color; initColorPickers(); refreshLobbyState(); }; container.appendChild(dot);
        });
    });
}

function startGame() { 
    if(isHost){ 
        score = [0, 0]; 
        gameStarted = true; 
        document.getElementById('menu-overlay').style.display="none"; 
        matchOrderT1 = []; matchOrderT2 = [];
        for(let i=0; i<activeCount; i++) {
            players[i].team = playerTeams[i];
            if(playerTeams[i] === 0) matchOrderT1.push(i); else matchOrderT2.push(i);
        }
        matchOrderT1.sort(() => Math.random() - 0.5);
        matchOrderT2.sort(() => Math.random() - 0.5);
        resetPos(true);
        sendToAll({type:'start'}); 
    } 
}

function backToLobby() {
    if(!gameStarted) return;
    gameStarted = false;
    document.getElementById('menu-overlay').style.display = "flex";
    if(isHost) { sendToAll({ type: 'backToLobby' }); refreshLobbyState(); }
}

function drawField() {
    const bgCtx = document.getElementById('bgCanvas').getContext('2d');
    bgCtx.fillStyle = "#2e7d32"; bgCtx.fillRect(0, 0, W, TOTAL_H);
    if (bannerLoaded) bgCtx.drawImage(topImage, 0, 0, W, OFFSET_TOP);
    const fW = W - 90, stripeW = fW / 9;
    for (let i = 0; i < 9; i++) { bgCtx.fillStyle = (i % 2 === 0) ? "#2e7d32" : "#388e3c"; bgCtx.fillRect(45 + (i * stripeW), OFFSET_TOP + 15, stripeW, H_GAME - 30); }
    bgCtx.strokeStyle = "rgba(255,255,255,0.5)"; bgCtx.lineWidth = 4;
    bgCtx.strokeRect(45, OFFSET_TOP+15, W-90, H_GAME-30); 
    bgCtx.strokeRect(45, MID_Y_GAME-100, 80, 200); bgCtx.strokeRect(W-125, MID_Y_GAME-100, 80, 200);
    bgCtx.beginPath(); bgCtx.moveTo(MID_X, OFFSET_TOP+15); bgCtx.lineTo(MID_X, OFFSET_TOP + H_GAME - 15); bgCtx.stroke();
    bgCtx.beginPath(); bgCtx.arc(MID_X, MID_Y_GAME, 70, 0, Math.PI*2); bgCtx.stroke();
    bgCtx.strokeStyle = "#FFF"; 
    bgCtx.strokeRect(15, MID_Y_GAME-GOAL_SIZE_HALF, 30, GOAL_SIZE_HALF*2); 
    bgCtx.strokeRect(W-45, MID_Y_GAME-GOAL_SIZE_HALF, 30, GOAL_SIZE_HALF*2);
    posts.forEach(p => { bgCtx.fillStyle="#FFF"; bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2); bgCtx.fill(); bgCtx.strokeStyle="#000"; bgCtx.lineWidth=2; bgCtx.stroke(); });
}

function resolve(c1, c2, isPost = false) {
    if (!c1 || !c2 || c1.x < -500 || c2.x < -500) return;
    let dx = c2.x - c1.x, dy = c2.y - c1.y, dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < c1.r + c2.r && dist > 0) {
        let nx = dx / dist, ny = dy / dist, overlap = (c1.r + c2.r) - dist;
        if (isPost) { c2.x += nx * overlap; c2.y += ny * overlap; }
        else { c1.x -= nx * overlap * 0.5; c1.y -= ny * overlap * 0.5; c2.x += nx * overlap * 0.5; c2.y += ny * overlap * 0.5; }
        let dot = (c2.vx - (isPost ? 0 : c1.vx))*nx + (c2.vy - (isPost ? 0 : c1.vy))*ny;
        if (dot < 0) {
            let bounce = isPost ? 0.41 : 0.85; 
            let impulse = -(1 + bounce) * dot / (1/(isPost?100:c1.m) + 1/c2.m);
            c2.vx += (impulse * nx) / c2.m; c2.vy += (impulse * ny) / c2.m;
            if (!isPost) { c1.vx -= (impulse * nx) / c1.m; c1.vy -= (impulse * ny) / c1.m; }
            if(c2 === ball || c1 === ball) ball.isPowered = false; 
        }
    }
}

function checkLimits(o, isBall) {
    const limitYTop = OFFSET_TOP + 15, limitYBottom = OFFSET_TOP + H_GAME - 15;
    const goalTop = MID_Y_GAME - GOAL_SIZE_HALF, goalBottom = MID_Y_GAME + GOAL_SIZE_HALF;
    if (isBall) {
        if (o.y - o.r < limitYTop || o.y + o.r > limitYBottom) { o.vy *= -0.54; o.y = o.y < MID_Y_GAME ? limitYTop + o.r : limitYBottom - o.r; ball.isPowered = false; }
        if (o.y > goalTop && o.y < goalBottom) {
            if (o.x - o.r < 15) { o.x = 15 + o.r; o.vx *= -0.5; }
            if (o.x + o.r > W - 15) { o.x = W - 15 - o.r; o.vx *= -0.5; }
            if (o.x < 45 || o.x > W - 45) {
                if (o.y - o.r < goalTop) { o.y = goalTop + o.r; o.vy *= -0.54; }
                if (o.y + o.r > goalBottom) { o.y = goalBottom - o.r; o.vy *= -0.54; }
            }
        } else {
            if (o.x - o.r < 45 || o.x + o.r > W - 45) { o.vx *= -0.54; o.x = o.x < MID_X ? 45 + o.r : W - 45 - o.r; ball.isPowered = false; }
        }
    } else {
        if (o.y < limitYTop) o.y = limitYTop; if (o.y > limitYBottom) o.y = limitYBottom;
        if (o.x < 45) o.x = 45; if (o.x > W - 45) o.x = W - 45;
    }
}

function resetPos(fullReset = false) {
    isGoalProcessed = false; 
    ball = { x: MID_X, y: MID_Y_GAME, tx: MID_X, ty: MID_Y_GAME, vx: 0, vy: 0, r: 10, m: 1, isPowered: false, isPlayer: false };
    trails.length = 0; ballTrails.length = 0; 
    for(let i=0; i<6; i++) {
        players[i].vx = 0; players[i].vy = 0;
        players[i].boostReadyTime = 0; players[i].boostEndTime = 0;
        if(fullReset) { players[i].pwrReadyTime = 0; }
    }
    const spacing = 110;
    const getSY = (idx, count) => MID_Y_GAME + (idx - (count - 1) / 2) * spacing;
    matchOrderT1.forEach((pIdx, i) => { players[pIdx].x = players[pIdx].tx = FIELD_MARGIN_X + 150; players[pIdx].y = players[pIdx].ty = getSY(i, matchOrderT1.length); });
    matchOrderT2.forEach((pIdx, i) => { players[pIdx].x = players[pIdx].tx = W - FIELD_MARGIN_X - 150; players[pIdx].y = players[pIdx].ty = getSY(i, matchOrderT2.length); });
}

function updateInput() {
    keys.ax = 0; keys.ay = 0; keys.kick = false; keys.boost = false; keys.pwr = false;
    let kx = 0, ky = 0;
    if (rawKeys['ArrowLeft'] || rawKeys['KeyA']) kx--; if (rawKeys['ArrowRight'] || rawKeys['KeyD']) kx++;
    if (rawKeys['ArrowUp'] || rawKeys['KeyW']) ky--; if (rawKeys['ArrowDown'] || rawKeys['KeyS']) ky++;
    if (rawKeys['Space'] || rawKeys['KeyX']) keys.kick = true;
    if (rawKeys['KeyC'] || rawKeys['KeyQ']) keys.pwr = true;
    if (rawKeys['ShiftLeft'] || rawKeys['ShiftRight']) keys.boost = true;
    const gp = navigator.getGamepads()[0];
    if (gp) {
        if (Math.abs(gp.axes[0]) > 0.1) kx = gp.axes[0]; if (Math.abs(gp.axes[1]) > 0.1) ky = gp.axes[1];
        if (gp.buttons[0].pressed || gp.buttons[2].pressed) keys.kick = true; 
        if (gp.buttons[1].pressed) keys.pwr = true; 
        if (gp.buttons[3].pressed || gp.buttons[5].pressed) keys.boost = true; 
    }
    if (kx || ky) { const mag = Math.sqrt(kx*kx + ky*ky); if(mag > 1) {kx/=mag; ky/=mag;} keys.ax = kx; keys.ay = ky; }
}

function movePlayer(p, input) {
    if(!p || p.x < -500 || goalMsg.timer > 0) return;
    const now = Date.now(); 
    let accel = (now < p.boostEndTime) ? 0.336 : 0.162;
    if (input.boost && now >= p.boostReadyTime) { p.boostEndTime = now + 250; p.boostReadyTime = now + 10000; }
    p.vx += input.ax * accel; p.vy += input.ay * accel; p.vx *= 0.89; p.vy *= 0.89; p.x += p.vx; p.y += p.vy;
    let dx = ball.x - p.x, dy = ball.y - p.y, d = Math.sqrt(dx*dx + dy*dy);
    if (d < p.r + ball.r + 8) {
        if (input.pwr && now >= p.pwrReadyTime) { ball.vx = (dx/d)*6.0669; ball.vy = (dy/d)*6.0669; ball.isPowered = true; p.kick = 15; p.pwrReadyTime = now + 30000; playSound(0.2); }
        else if (input.kick) { ball.vx = (dx/d)*4.05; ball.vy = (dy/d)*4.05; ball.isPowered = false; p.kick = 15; playSound(0.13); }
    }
    if (p.kick > 0) p.kick--;
}

function gameLoop(t) {
    const oraCorrente = Date.now();
    if (isHost && gameStarted) {
        updateInput(); 
        if (goalMsg.timer <= 0) {
            if (!isGoalProcessed && ball.y > MID_Y_GAME - GOAL_SIZE_HALF && ball.y < MID_Y_GAME + GOAL_SIZE_HALF) {
                if (ball.x < 45) { isGoalProcessed = true; score[1]++; goalMsg = {text: msgLib[Math.floor(Math.random()*msgLib.length)], timer:120}; sendToAll({type:'goal', text:goalMsg.text, score}); setTimeout(() => resetPos(false), 2000); }
                else if (ball.x > W - 45) { isGoalProcessed = true; score[0]++; goalMsg = {text: msgLib[Math.floor(Math.random()*msgLib.length)], timer:120}; sendToAll({type:'goal', text:goalMsg.text, score}); setTimeout(() => resetPos(false), 2000); }
            }
            movePlayer(players[0], keys); 
            for(let i=1; i<activeCount; i++) if(allRemoteKeys[i]) movePlayer(players[i], allRemoteKeys[i]);
            ball.vx *= 0.98894; ball.vy *= 0.98894; ball.x += ball.vx; ball.y += ball.vy;
            if (ball.isPowered && Math.abs(ball.vx) + Math.abs(ball.vy) < 0.2) ball.isPowered = false;
            for(let i=0; i<activeCount; i++) { for(let j=i+1; j<activeCount; j++) resolve(players[i], players[j]); resolve(players[i], ball); posts.forEach(post => resolve(post, players[i], true)); }
            posts.forEach(p => resolve(p, ball, true));
            checkLimits(ball, true); for(let i=0; i<activeCount; i++) checkLimits(players[i], false);
        }
        if (t - lastSync > 32) { sendToAll({ type: 'sync', ball, players: players.slice(0, activeCount), score: score }); lastSync = t; }
    } else if (!isHost && gameStarted) {
        const lerpFactor = 0.25; 
        ball.x += (ball.tx - ball.x) * lerpFactor; ball.y += (ball.ty - ball.y) * lerpFactor;
        for(let i=0; i<activeCount; i++) { if (players[i].tx > -500) { players[i].x += (players[i].tx - players[i].x) * lerpFactor; players[i].y += (players[i].ty - players[i].y) * lerpFactor; } }
    }
    if (goalMsg.timer > 0) goalMsg.timer--;

    for(let i=0; i<activeCount; i++){ const p = players[i]; if(p.x > -500 && oraCorrente < p.boostEndTime) trails.push({ x: p.x, y: p.y, r: p.r, color: teamColors[p.team], life: 1.0 }); }
    for (let i = trails.length - 1; i >= 0; i--) { trails[i].life -= 0.05; if (trails[i].life <= 0) trails.splice(i, 1); }
    
    if (ball.isPowered) ballTrails.push({ x: ball.x, y: ball.y, r: ball.r, life: 1.0 });
    for (let i = ballTrails.length - 1; i >= 0; i--) { ballTrails[i].life -= 0.1; if (ballTrails[i].life <= 0) ballTrails.splice(i, 1); }
    if (ballTrails.length > 20) ballTrails.shift();
    
    draw(); requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', e => { rawKeys[e.code] = true; if(audioCtx.state === 'suspended') audioCtx.resume(); if(e.code === 'Escape') backToLobby(); });
window.addEventListener('keyup', e => rawKeys[e.code] = false);

function draw() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    const now = Date.now();
    ctx.clearRect(0, 0, W, TOTAL_H);
    
    ctx.globalCompositeOperation = 'lighter';
    for (const tr of trails) { ctx.globalAlpha = tr.life * 0.3; ctx.fillStyle = tr.color; ctx.beginPath(); ctx.arc(tr.x, tr.y, tr.r * (0.5 + tr.life * 0.5), 0, 6.28); ctx.fill(); }
    
    for (const tr of ballTrails) { 
        ctx.globalAlpha = tr.life * 0.4; 
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; 
        ctx.beginPath(); 
        ctx.arc(tr.x, tr.y, tr.r * (0.8 + tr.life * 0.4), 0, 6.28); 
        ctx.fill(); 
    }
    
    ctx.globalAlpha = 1.0;
    ctx.globalCompositeOperation = 'source-over';

    const myP = players[mySlot];
    if (myP) {
        const bRem = Math.ceil((myP.boostReadyTime - now) / 1000), pRem = Math.ceil((myP.pwrReadyTime - now) / 1000);
        document.getElementById('timer-boost').innerText = "BST: " + (bRem > 0 ? bRem + "s" : "READY");
        document.getElementById('timer-pwr').innerText = "PWR: " + (pRem > 0 ? pRem + "s" : "READY");
        document.getElementById('timer-boost').style.color = (bRem > 0) ? "#FFEB3B" : "#4CAF50";
        document.getElementById('timer-pwr').style.color = (pRem > 0) ? "#00FFFF" : "#4CAF50";
    }

    ctx.lineWidth = 4;
    for(let i=0; i<activeCount; i++) {
        const p = players[i]; if (p.x < -500) continue;
        ctx.fillStyle = teamColors[p.team]; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fill();
        ctx.strokeStyle = (p.kick > 0 ? "#FFF" : "#000"); ctx.stroke();
        ctx.fillStyle = (i === mySlot) ? "yellow" : "white"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center"; ctx.fillText("P" + (i + 1), p.x, p.y - p.r - 8);
    }

    ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 6.28); ctx.fill(); 
    ctx.strokeStyle = ball.isPowered ? "rgba(255,255,255,0.8)" : "#000"; ctx.lineWidth = ball.isPowered ? 3 : 1; ctx.stroke();

    if (goalMsg.timer > 0) { ctx.font = "bold 80px sans-serif"; ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.fillText(goalMsg.text, MID_X, MID_Y_GAME); }
    document.getElementById('live-score').innerText = score[0] + " - " + score[1];
}
</script>
