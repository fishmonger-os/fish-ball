<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FISHBALL 2D PRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #2e7d32; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        #bgCanvas { z-index: 1; }
        #gameCanvas { z-index: 2; }
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(5px); }
        .lobby-box { background: #222; padding: 25px; border-radius: 20px; border: 1px solid #444; text-align: center; min-width: 550px; }
        @media (max-width: 600px) { .lobby-box { min-width: 90%; padding: 15px; } }
        .team-settings { display: flex; justify-content: space-around; margin: 15px 0; gap: 10px; }
        .team-box { background: #333; padding: 10px; border-radius: 12px; flex: 1; border: 1px solid #444; }
        
        select { background: #444; color: white; border: 1px solid #666; border-radius: 4px; padding: 4px; font-size: 0.8em; cursor: pointer; }
        select option { background: #222; }
        .color-preview { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #fff; flex-shrink: 0; }

        .player-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .p-slot { opacity: 0.4; filter: grayscale(1); transition: 0.3s; padding: 8px; border-radius: 8px; border: 1px solid transparent; display: flex; align-items: center; justify-content: space-between; color: #777; font-weight: normal; cursor: pointer; gap: 5px; }
        .p-slot.active { opacity: 1; filter: grayscale(0); color: #fff; font-weight: bold; }
        .p-slot.is-me { color: #ffeb3b !important; border: 1px solid rgba(255, 235, 59, 0.3); }
        .p-slot.team-0 { border-left: 5px solid #FF0000; background: rgba(255,0,0,0.1); }
        .p-slot.team-1 { border-left: 5px solid #0000FF; background: rgba(0,0,255,0.1); }
        .name-input { background: transparent; border: none; color: inherit; border-radius: 4px; padding: 2px 5px; width: 90px; font-size: 0.9em; font-weight: inherit; text-align: center; outline: none; }
        .number-input { background: transparent; border: none; color: inherit; border-radius: 4px; padding: 2px; width: 30px; font-size: 0.9em; font-weight: inherit; text-align: center; outline: none; }
        .p-slot.active .name-input, .p-slot.active .number-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); cursor: text; }
        #fs-btn { display: block; background: #2196F3; color: white; border: none; padding: 12px 25px; font-size: 1.1em; cursor: pointer; border-radius: 30px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; width: 100%; transition: background 0.2s; }
        #fs-btn:hover { background: #1976D2; }
        #start-btn { background: #4CAF50; color: white; border: none; padding: 15px 50px; font-size: 1.2em; cursor: pointer; border-radius: 30px; display: none; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        #esc-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.7); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; z-index: 100; display: none; align-items: center; justify-content: center; }
        .ui-bottom-right { position: absolute; bottom: 30px; right: 30px; text-align: right; pointer-events: none; z-index: 5; font-family: monospace; }
        #live-score { font-size: 3.5em; font-weight: 900; line-height: 1; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .timer-display { font-size: 2em; font-weight: 900; margin-bottom: 10px; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); transition: color 0.2s; letter-spacing: 1px; }
        #kick-bar-container { width: 100px; height: 10px; background: #444; border: 1px solid #fff; margin-top: 5px; display: none; }
        #kick-bar-fill { height: 100%; width: 0%; background: #ffff00; }
        #aura-status { font-size: 2em; color: #ffcc80; font-weight: 900; margin-bottom: 5px; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); letter-spacing: 1px; }
        input#link-input { background: #1a1a1a; color: #00ff00; border: 1px solid #333; padding: 10px; width: 90%; margin-top: 10px; cursor: pointer; border-radius: 5px; font-family: monospace; text-align: center; }
    </style>
</head>
<body>

    <div id="game-container">
        <button id="esc-btn" onclick="backToLobby()">✕</button>
        <canvas id="bgCanvas" width="956" height="720"></canvas>
        <canvas id="gameCanvas" width="956" height="720"></canvas>
        <div id="menu-overlay">
            <div class="lobby-box">
                <h1 style="margin:0; color:#4CAF50; letter-spacing: 2px; font-size: 1.5em;">FISHBALL 2D PRO</h1>
                <div id="status-text" style="margin-bottom: 10px; font-size: 0.9em; color: #aaa;">Inizializzazione...</div>
                <button id="fs-btn" onclick="toggleFullscreen()">SCHERMO INTERO</button>
                
                <div class="team-settings" id="host-controls" style="display:none;">
                    <div class="team-box">
                        <b style="color:#ff4444; font-size: 0.8em;">SQUADRA 1</b>
                        <div style="margin-top:8px; display: flex; flex-direction: column; gap: 5px;">
                            <div style="display:flex; align-items:center; gap:5px;">
                                <div id="preview-t1-c1" class="color-preview"></div>
                                <select id="select-t1-c1" onchange="updateTeamColor(0, this.value)" style="flex:1;"></select>
                            </div>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <div id="preview-t1-c2" class="color-preview"></div>
                                <select id="select-t1-c2" onchange="updateTeamColor(1, this.value)" style="flex:1;"></select>
                            </div>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <div id="preview-t1-num" class="color-preview"></div>
                                <select id="select-t1-num" onchange="updateNumberColor(0, this.value)" style="flex:1;"></select>
                            </div>
                        </div>
                    </div>
                    <div class="team-box">
                        <b style="color:#4444ff; font-size: 0.8em;">SQUADRA 2</b>
                        <div style="margin-top:8px; display: flex; flex-direction: column; gap: 5px;">
                            <div style="display:flex; align-items:center; gap:5px;">
                                <div id="preview-t2-c1" class="color-preview"></div>
                                <select id="select-t2-c1" onchange="updateTeamColor(2, this.value)" style="flex:1;"></select>
                            </div>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <div id="preview-t2-c2" class="color-preview"></div>
                                <select id="select-t2-c2" onchange="updateTeamColor(3, this.value)" style="flex:1;"></select>
                            </div>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <div id="preview-t2-num" class="color-preview"></div>
                                <select id="select-t2-num" onchange="updateNumberColor(1, this.value)" style="flex:1;"></select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="player-status-grid">
                    <div id="slot0" class="p-slot team-0" onclick="togglePlayerTeam(0)">
                        <input type="text" class="name-input" id="name0" value="TU" maxlength="8" oninput="handleNameChange(0)" onclick="event.stopPropagation()">
                        <input type="text" class="number-input" id="num0" value="1" maxlength="2" oninput="handleNumberChange(0)" onclick="event.stopPropagation()">
                        <span id="label0" style="font-size: 0.7em;"></span>
                    </div> 
                    <div id="slot1" class="p-slot team-1" onclick="togglePlayerTeam(1)">
                        <input type="text" class="name-input" id="name1" value="BOT" maxlength="8" oninput="handleNameChange(1)" onclick="event.stopPropagation()">
                        <input type="text" class="number-input" id="num1" value="2" maxlength="2" oninput="handleNumberChange(1)" onclick="event.stopPropagation()">
                        <span id="label1" style="font-size: 0.7em;"></span>
                    </div>
                    <div id="slot2" class="p-slot team-0" onclick="togglePlayerTeam(2)">
                        <input type="text" class="name-input" id="name2" value="P3" maxlength="8" oninput="handleNameChange(2)" onclick="event.stopPropagation()">
                        <input type="text" class="number-input" id="num2" value="3" maxlength="2" oninput="handleNumberChange(2)" onclick="event.stopPropagation()">
                        <span id="label2" style="font-size: 0.7em;"></span>
                    </div> 
                    <div id="slot3" class="p-slot team-1" onclick="togglePlayerTeam(3)">
                        <input type="text" class="name-input" id="name3" value="P4" maxlength="8" oninput="handleNameChange(3)" onclick="event.stopPropagation()">
                        <input type="text" class="number-input" id="num3" value="4" maxlength="2" oninput="handleNumberChange(3)" onclick="event.stopPropagation()">
                        <span id="label3" style="font-size: 0.7em;"></span>
                    </div>
                    <div id="slot4" class="p-slot team-0" onclick="togglePlayerTeam(4)">
                        <input type="text" class="name-input" id="name4" value="P5" maxlength="8" oninput="handleNameChange(4)" onclick="event.stopPropagation()">
                        <input type="text" class="number-input" id="num4" value="5" maxlength="2" oninput="handleNumberChange(4)" onclick="event.stopPropagation()">
                        <span id="label4" style="font-size: 0.7em;"></span>
                    </div> 
                    <div id="slot5" class="p-slot team-1" onclick="togglePlayerTeam(5)">
                        <input type="text" class="name-input" id="name5" value="P6" maxlength="8" oninput="handleNameChange(5)" onclick="event.stopPropagation()">
                        <input type="text" class="number-input" id="num5" value="6" maxlength="2" oninput="handleNumberChange(5)" onclick="event.stopPropagation()">
                        <span id="label5" style="font-size: 0.7em;"></span>
                    </div>
                </div>
                <button id="start-btn" onclick="startGame()">GIOCA ORA</button>
            </div>
        </div>
        <div class="ui-bottom-right">
            <div id="aura-status">L1: OK</div>
            <div id="timer-boost" class="timer-display"></div>
            <div id="kick-bar-container"><div id="kick-bar-fill"></div></div>
            <div id="live-score">0 - 0</div>
        </div>
    </div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let lastSoundTime = 0;
function playHitSound(freq = 60) {
    const now = audioCtx.currentTime;
    if (now - lastSoundTime < 0.1) return;
    lastSoundTime = now;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(now + 0.1);
}

const COLORS_50 = ['#FF0000', '#FF4500', '#FF8C00', '#FFA500', '#FFD700', '#FFFF00', '#ADFF2F', '#7FFF00', '#00FF00', '#32CD32', '#00FA9A', '#00FFFF', '#00CED1', '#1E90FF', '#0000FF', '#00008B', '#8A2BE2', '#4B0082', '#9400D3', '#9932CC', '#BA55D3', '#FF00FF', '#FF1493', '#FF69B4', '#FFC0CB', '#FAEBD7', '#F5F5DC', '#FFE4C4', '#FFE4B5', '#FFDEAD', '#D2B48C', '#BC8F8F', '#F4A460', '#DAA520', '#B8860B', '#CD853F', '#D2691E', '#8B4513', '#A0522D', '#A52A2A', '#800000', '#FFFFFF', '#DCDCDC', '#D3D3D3', '#C0C0C0', '#A9A9A9', '#808080', '#696969', '#2F4F4F', '#000000'];
let teamColors = ['#FF0000', '#FF0000', '#0000FF', '#0000FF'];
let numberColors = ['#FFFFFF', '#FFFFFF']; 
let playerTeams = [0, 1, 0, 1, 0, 1];
let playerNames = ["TU", "BOT", "P3", "P4", "P5", "P6"];
let playerNumbers = ["1", "2", "3", "4", "5", "6"];

const W = 956, OFFSET_TOP = 130, TOTAL_H = 720, H_GAME_BASE = TOTAL_H - OFFSET_TOP - 20;
const MID_X = W / 2, MID_Y_GAME = OFFSET_TOP + (H_GAME_BASE / 2), GOAL_SIZE_HALF = 68;

let fieldOffsetX = 0, fieldOffsetY = 0; 
let players = Array.from({length: 6}, () => ({ 
    x: -1000, y: -1000, tx: -1000, ty: -1000, vx: 0, vy: 0, r: 16, m: 6, kick: 0, 
    boostRemaining: 1200, boostReadyTime: 0, isBoosting: false,
    kickCharge: 0, kickStartTime: 0, shotBufferTime: 0, bufferedCharge: 0, wasKickBasePressed: false, team: 0,
    lastAuraTime: 0, auraActiveUntil: 0, auraVisualTimer: 0, isBot: false
}));

let ball = { x: MID_X, y: MID_Y_GAME, tx: MID_X, ty: MID_Y_GAME, vx: 0, vy: 0, r: 10, m: 1 };
let score = [0, 0], goalMsg = { text: "", timer: 0 }, isGoalProcessed = false, gameStarted = false, isHost = false, activeCount = 1, mySlot = 0, lastSync = 0;
const keys = { ax: 0, ay: 0, kickBase: false, kickCharge: false, boost: false, aura: false }, rawKeys = {}, allRemoteKeys = {};

let posts = [];
function updatePosts() {
    const limitXLeft = 45 + fieldOffsetX;
    const limitXRight = W - 45 - fieldOffsetX;
    posts = [
        {x: limitXLeft, y: MID_Y_GAME - GOAL_SIZE_HALF, r: 5.6},
        {x: limitXLeft, y: MID_Y_GAME + GOAL_SIZE_HALF, r: 5.6},
        {x: limitXRight, y: MID_Y_GAME - GOAL_SIZE_HALF, r: 5.6},
        {x: limitXRight, y: MID_Y_GAME + GOAL_SIZE_HALF, r: 5.6}
    ];
}

let bannerLoaded = false, topImage = new Image();
topImage.onload = () => { bannerLoaded = true; drawField(); };
topImage.src = 'banner.png';

const peer = new Peer({ debug: 1 });
let connections = [], guestConn = null;

peer.on('open', id => {
    const joinId = new URLSearchParams(window.location.search).get('join');
    if (joinId) { 
        isHost = false; document.getElementById('status-text').innerText = "Connessione...";
        guestConn = peer.connect(joinId, { reliable: true }); setupGuest(guestConn); 
    } else { 
        isHost = true; const inviteLink = window.location.origin + window.location.pathname + "?join=" + id;
        document.getElementById('status-text').innerHTML = `ID Lobby: <input type="text" id="link-input" value="${inviteLink}" readonly onclick="this.select(); document.execCommand('copy');">`; 
        document.getElementById('start-btn').style.display = "inline-block"; initColorPickers(); refreshLobbyState(); drawField(); requestAnimationFrame(gameLoop); 
    }
});

function setupGuest(conn) {
    conn.on('open', () => { conn.send({ type: 'join' }); });
    conn.on('data', data => {
        if (data.type === 'initSlot') { mySlot = data.slot; teamColors = data.colors; numberColors = data.numColors || ['#FFFFFF', '#FFFFFF']; playerTeams = data.teams; playerNames = data.names; playerNumbers = data.numbers || ["1", "2", "3", "4", "5", "6"]; refreshLobbyState(); }
        if (data.type === 'lobbyUpdate') { activeCount = data.count + 1; teamColors = data.colors; numberColors = data.numColors || ['#FFFFFF', '#FFFFFF']; playerTeams = data.teams; playerNames = data.names; playerNumbers = data.numbers || ["1", "2", "3", "4", "5", "6"]; refreshLobbyState(); }
        if (data.type === 'start') { activeCount = data.activeCount; resetPos(true); gameStarted = true; document.getElementById('menu-overlay').style.display = "none"; document.getElementById('esc-btn').style.display = "flex"; }
        if (data.type === 'sync') { 
            ball.tx = data.ball.x; ball.ty = data.ball.y; score = data.score;
            const now = Date.now();
            data.players.forEach((p, i) => { if(players[i]) { players[i].tx = p.x; players[i].ty = p.y; players[i].kick = p.kick; players[i].boostRemaining = p.boostRemaining; players[i].boostReadyTime = now + p.boostReadyRemaining; players[i].isBoosting = p.isBoosting; players[i].team = p.team; players[i].kickCharge = p.kickCharge; players[i].auraActiveUntil = p.auraActiveUntil; players[i].auraVisualTimer = p.auraVisualTimer; } });
        }
        if (data.type === 'goal') { goalMsg = { text: data.text, timer: 120 }; score = data.score; }
        if (data.type === 'stop') backToLobby();
    });
    setInterval(() => { if(gameStarted && conn.open) { updateInput(); conn.send({type:'input', keys}); } }, 16);
    requestAnimationFrame(gameLoop);
}

peer.on('connection', conn => {
    conn.on('open', () => {
        if (connections.length >= 5) { conn.close(); return; }
        conn.on('data', data => { 
            if(data.type === 'join') { connections.push(conn); conn.send({ type: 'initSlot', slot: connections.indexOf(conn) + 1, colors: teamColors, numColors: numberColors, teams: playerTeams, names: playerNames, numbers: playerNumbers }); refreshLobbyState(); }
            if(data.type === 'input') { allRemoteKeys[connections.indexOf(conn) + 1] = data.keys; }
            if(data.type === 'updateName') { playerNames[data.slot] = data.name; refreshLobbyState(); }
            if(data.type === 'updateNumber') { playerNumbers[data.slot] = data.number; refreshLobbyState(); }
        });
        conn.on('close', () => { connections = connections.filter(c => c !== conn); refreshLobbyState(); });
    });
});

function updateInput() {
    let kx = 0, ky = 0; keys.kickBase = keys.kickCharge = keys.boost = keys.aura = false;
    if (document.activeElement.tagName === 'INPUT') return;
    const gp = navigator.getGamepads()[0];
    if (gp) {
        if (Math.abs(gp.axes[0]) > 0.1) kx = gp.axes[0]; if (Math.abs(gp.axes[1]) > 0.1) ky = gp.axes[1];
        keys.kickBase = gp.buttons[0].pressed; keys.kickCharge = gp.buttons[2].pressed; keys.boost = gp.buttons[5].pressed; keys.aura = gp.buttons[4].pressed; 
    } else {
        if (rawKeys['ArrowLeft'] || rawKeys['KeyA']) kx--; if (rawKeys['ArrowRight'] || rawKeys['KeyD']) kx++;
        if (rawKeys['ArrowUp'] || rawKeys['KeyW']) ky--; if (rawKeys['ArrowDown'] || rawKeys['KeyS']) ky++;
        if (rawKeys['Space']) keys.kickBase = true; if (rawKeys['KeyC']) keys.kickCharge = true;
        if (rawKeys['ShiftLeft']) keys.boost = true; if (rawKeys['KeyV']) keys.aura = true;
        if (kx !== 0 || ky !== 0) { let kmag = Math.sqrt(kx * kx + ky * ky); kx /= kmag; ky /= kmag; }
    }
    keys.ax = kx; keys.ay = ky;
}

function resolve(c1, c2, isPost = false) { 
    if (!c1 || !c2 || c1.x < -500 || c2.x < -500) return;
    let dx = c2.x - c1.x, dy = c2.y - c1.y, dist = Math.sqrt(dx*dx + dy*dy), minDist = c1.r + c2.r;
    if (dist < minDist && dist > 0) { 
        let nx = dx / dist, ny = dy / dist, overlap = minDist - dist;
        if (isPost) { c2.x += nx * overlap; c2.y += ny * overlap; }
        else { c1.x -= nx * overlap * 0.5; c1.y -= ny * overlap * 0.5; c2.x += nx * overlap * 0.5; c2.y += ny * overlap * 0.5; }
        let relVX = c2.vx - (isPost ? 0 : c1.vx), relVY = c2.vy - (isPost ? 0 : c1.vy), dot = relVX*nx + relVY*ny;
        if (dot < 0) { 
            if ((c1 === ball || c2 === ball) && !isPost && Math.abs(dot) > 1.2) playHitSound();
            let bounce = 0.85; if (isPost) { let speed = Math.sqrt(c2.vx * c2.vx + c2.vy * c2.vy); bounce = (speed > 3.5) ? 0.55 : 0.275; }
            let m1 = isPost ? 100 : c1.m, m2 = c2.m;
            let impulse = -(1 + bounce) * dot / (1/m1 + 1/m2);
            c2.vx += (impulse * nx) / m2; c2.vy += (impulse * ny) / m2; if (!isPost) { c1.vx -= (impulse * nx) / m1; c1.vy -= (impulse * ny) / m1; }
        } 
    } 
}

function checkLimits(o, isBall) {
    const limitYTop = OFFSET_TOP + 15 + fieldOffsetY, limitYBottom = OFFSET_TOP + H_GAME_BASE - 15 - fieldOffsetY;
    const goalTop = MID_Y_GAME - GOAL_SIZE_HALF, goalBottom = MID_Y_GAME + GOAL_SIZE_HALF;
    const limitXLeft = 45 + fieldOffsetX, limitXRight = W - 45 - fieldOffsetX;
    if (isBall) {
        let speed = Math.sqrt(o.vx * o.vx + o.vy * o.vy);
        let bounceFactor = 0.3857; 
        if (speed > 3.5) bounceFactor = Math.min(0.6612, 0.3857 + (speed * 0.033));

        if (o.y - o.r < limitYTop) { o.y = limitYTop + o.r; o.vy = Math.abs(o.vy) * bounceFactor; } 
        else if (o.y + o.r > limitYBottom) { o.y = limitYBottom - o.r; o.vy = -Math.abs(o.vy) * bounceFactor; }
        
        if (o.x - o.r < limitXLeft) { 
            if (o.y < goalTop || o.y > goalBottom) { o.x = limitXLeft + o.r; o.vx = Math.abs(o.vx) * bounceFactor; } 
            else if (o.x < 15 + o.r + fieldOffsetX) o.x = 15 + o.r + fieldOffsetX; 
        }
        else if (o.x + o.r > limitXRight) { 
            if (o.y < goalTop || o.y > goalBottom) { o.x = limitXRight - o.r; o.vx = -Math.abs(o.vx) * bounceFactor; } 
            else if (o.x > W - 15 - o.r - fieldOffsetX) o.x = W - 15 - o.r - fieldOffsetX; 
        }
    } else {
        o.y = Math.max(limitYTop, Math.min(o.y, limitYBottom));
        if (o.x < limitXLeft && (o.y < goalTop || o.y > goalBottom)) o.x = limitXLeft;
        if (o.x > limitXRight && (o.y < goalTop || o.y > goalBottom)) o.x = limitXRight;
        if (o.x < 15 + o.r + fieldOffsetX) o.x = 15 + o.r + fieldOffsetX; 
        if (o.x > W - 15 - o.r - fieldOffsetX) o.x = W - 15 - o.r - fieldOffsetX;
    }
}

function movePlayer(p, input, dt) { 
    if(!p || p.x < -500 || goalMsg.timer > 0) return;
    const now = Date.now(); 
    if (now < p.auraActiveUntil) { p.vx *= 0.967; p.vy *= 0.967; p.x += p.vx; p.y += p.vy; return; }
    if (input.aura && now - p.lastAuraTime > 30000) {
        for(let i=0; i<6; i++) {
            let t = players[i]; if (t && t !== p && t.team !== p.team && t.x > -500) {
                let dx = t.x - p.x, dy = t.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 50) { t.auraActiveUntil = now + 1200; t.vx = (dx/dist) * 1.35; t.vy = (dy/dist) * 1.35; p.lastAuraTime = now; p.auraVisualTimer = 15; if (isHost) playHitSound(200); }
            }
        }
    }
    if (p.auraVisualTimer > 0) p.auraVisualTimer--;
    if (input.boost && now >= p.boostReadyTime && p.boostRemaining > 0) { p.isBoosting = true; p.boostRemaining -= dt; if (p.boostRemaining <= 0) { p.boostRemaining = 0; p.boostReadyTime = now + 12000; p.isBoosting = false; } } else { p.isBoosting = false; }
    if (now >= p.boostReadyTime && p.boostRemaining <= 0) { p.boostRemaining = 1200; }
    let accel = p.isBoosting ? 0.097 : 0.0436; p.vx += input.ax * accel; p.vy += input.ay * accel; p.vx *= 0.967; p.vy *= 0.967; p.x += p.vx; p.y += p.vy;
    if (isHost) {
        let dx = ball.x - p.x, dy = ball.y - p.y, d = Math.sqrt(dx*dx + dy*dy), inRange = d < p.r + ball.r + 12;
        if (input.kickBase) { if (!p.wasKickBasePressed) { if (inRange) executeShot(p, dx, dy, d, 3.52); else { p.shotBufferTime = now + 250; p.bufferedCharge = 3.52; } } p.wasKickBasePressed = true; } else { p.wasKickBasePressed = false; }
        if (input.kickCharge) { if (p.kickStartTime === 0) p.kickStartTime = now; p.kickCharge = Math.min(1, (now - p.kickStartTime) / 800); } 
        else if (p.kickStartTime > 0) { let fP = 3.52 + (p.kickCharge * 1.97); if (inRange) executeShot(p, dx, dy, d, fP); else { p.shotBufferTime = now + 400; p.bufferedCharge = fP; } p.kickStartTime = 0; p.kickCharge = 0; }
        if (p.shotBufferTime > now && inRange) { executeShot(p, dx, dy, d, p.bufferedCharge); p.shotBufferTime = 0; }
    }
    if (p.kick > 0) p.kick--;
}

function executeShot(p, dx, dy, d, power) { ball.vx = (dx/d) * power; ball.vy = (dy/d) * power; p.kick = 15; if (isHost) playHitSound(); }

function gameLoop(t) {
    if (gameStarted) {
        if (isHost) {
            const now = Date.now(); updateInput();
            if (goalMsg.timer <= 0) {
                if ((ball.x < 33 + fieldOffsetX || ball.x > W - 33 - fieldOffsetX) && ball.y > MID_Y_GAME - GOAL_SIZE_HALF && ball.y < MID_Y_GAME + GOAL_SIZE_HALF) { 
                    if (!isGoalProcessed) { isGoalProcessed = true; if (ball.x < MID_X) score[1]++; else score[0]++; goalMsg = { text: "GOAL!", timer: 120 }; ball.vx = ball.vy = 0; sendToAll({ type: 'goal', text: "GOAL!", score }); setTimeout(() => resetPos(), 2000); }
                }
                if (!isGoalProcessed) {
                    movePlayer(players[0], keys, 16.6); for(let i=1; i<6; i++) { if (players[i].isBot) { let bdx = ball.x - players[i].x, bdy = ball.y - players[i].y, bd = Math.sqrt(bdx*bdx + bdy*bdy); movePlayer(players[i], { ax: bdx/bd, ay: bdy/bd, kickBase: bd < 40 }, 16.6); } else if(allRemoteKeys[i]) { movePlayer(players[i], allRemoteKeys[i], 16.6); } }
                    ball.vx *= 0.993; ball.vy *= 0.993; ball.x += ball.vx; ball.y += ball.vy;
                    for(let i=0; i<6; i++) { if (players[i].x < -500) continue; for(let j=i+1; j<6; j++) { if(players[j].x > -500) resolve(players[i], players[j]); } resolve(players[i], ball); posts.forEach(post => resolve(post, players[i], true)); checkLimits(players[i], false); }
                    posts.forEach(p => resolve(p, ball, true)); checkLimits(ball, true);
                }
            }
            if (t - lastSync > 30) { sendToAll({ type: 'sync', ball: {x: ball.x, y: ball.y}, score, players: players.map(p => ({ x: p.x, y: p.y, kick: p.kick, team: p.team, boostReadyRemaining: Math.max(0, p.boostReadyTime - now), boostRemaining: p.boostRemaining, isBoosting: p.isBoosting, kickCharge: p.kickCharge, auraActiveUntil: p.auraActiveUntil, auraVisualTimer: p.auraVisualTimer })) }); lastSync = t; }
        } else {
            ball.x += (ball.tx - ball.x) * 0.35; ball.y += (ball.ty - ball.y) * 0.35;
            for(let i=0; i<6; i++) { players[i].x += (players[i].tx - players[i].x) * 0.35; players[i].y += (players[i].ty - players[i].y) * 0.35; }
        }
    }
    if (goalMsg.timer > 0) goalMsg.timer--; draw(); requestAnimationFrame(gameLoop);
}

function resetPos(full) {
    isGoalProcessed = false; ball.x = ball.tx = MID_X; ball.y = ball.ty = MID_Y_GAME; ball.vx = ball.vy = 0;
    let currentPlayers = isHost ? (connections.length + 1) : activeCount; if (isHost && currentPlayers === 1) currentPlayers = 2;
    if (currentPlayers <= 4) { fieldOffsetX = (W - 90) * 0.16 * 0.5; fieldOffsetY = (H_GAME_BASE - 30) * 0.16 * 0.5; } else { fieldOffsetX = 0; fieldOffsetY = 0; }
    updatePosts(); drawField(); 
    if (currentPlayers === 2 && isHost && connections.length === 0) { players[1].isBot = true; } else { players[1].isBot = false; }
    for(let i=0; i<6; i++) if(players[i]) { players[i].vx = players[i].vy = 0; players[i].x = players[i].tx = -1000; if(full) { players[i].boostReadyTime = 0; players[i].boostRemaining = 1200; players[i].lastAuraTime = 0; players[i].auraActiveUntil = 0; players[i].auraVisualTimer = 0; } }
    const spawnX = 250 - (fieldOffsetX * 0.8), spawnYOffset = 120 - (fieldOffsetY * 0.5);
    players[0].x = players[0].tx = spawnX + fieldOffsetX; players[0].y = players[0].ty = MID_Y_GAME;
    if (players[1].isBot || currentPlayers > 1) { players[1].x = players[1].tx = W - spawnX - fieldOffsetX; players[1].y = players[1].ty = MID_Y_GAME; }
    if(currentPlayers > 2) { players[2].x = players[2].tx = 120 + fieldOffsetX; players[2].y = players[2].ty = MID_Y_GAME - spawnYOffset; }
    if(currentPlayers > 3) { players[3].x = players[3].tx = W - 120 - fieldOffsetX; players[3].y = players[3].ty = MID_Y_GAME - spawnYOffset; }
    if(currentPlayers > 4) { players[4].x = players[4].tx = 120 + fieldOffsetX; players[4].y = players[4].ty = MID_Y_GAME + spawnYOffset; }
    if(currentPlayers > 5) { players[5].x = players[5].tx = W - 120 - fieldOffsetX; players[5].y = players[5].ty = MID_Y_GAME + spawnYOffset; }
}

function drawField() { 
    const bgCtx=document.getElementById('bgCanvas').getContext('2d'); bgCtx.fillStyle="#2e7d32"; bgCtx.fillRect(0,0,W,TOTAL_H);
    if(bannerLoaded) bgCtx.drawImage(topImage,0,0,W,OFFSET_TOP);
    const fW = (W - 90) - (fieldOffsetX * 2), fH = (H_GAME_BASE - 30) - (fieldOffsetY * 2), sW = fW / 9, startX = 45 + fieldOffsetX, startY = OFFSET_TOP + 15 + fieldOffsetY;
    for(let i=0; i<9; i++){ bgCtx.fillStyle=(i%2===0)?"#2e7d32":"#388e3c"; bgCtx.fillRect(startX + (i*sW), startY, sW, fH); }
    bgCtx.strokeStyle="rgba(255,255,255,0.5)"; bgCtx.lineWidth=4; bgCtx.strokeRect(startX, startY, fW, fH);
    bgCtx.strokeRect(startX, MID_Y_GAME-100, 80, 200); bgCtx.strokeRect(startX + fW - 80, MID_Y_GAME-100, 80, 200);
    bgCtx.beginPath(); bgCtx.moveTo(MID_X, startY); bgCtx.lineTo(MID_X, startY + fH); bgCtx.stroke();
    bgCtx.beginPath(); bgCtx.arc(MID_X, MID_Y_GAME, 70, 0, 6.28); bgCtx.stroke();
    bgCtx.strokeStyle="#FFF"; bgCtx.strokeRect(startX - 30, MID_Y_GAME-GOAL_SIZE_HALF, 30, GOAL_SIZE_HALF*2); bgCtx.strokeRect(startX + fW, MID_Y_GAME-GOAL_SIZE_HALF, 30, GOAL_SIZE_HALF*2);
    posts.forEach(p=>{bgCtx.fillStyle="#FFF"; bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,6.28); bgCtx.fill();});
}

function draw() { 
    const ctx=document.getElementById('gameCanvas').getContext('2d'), now=Date.now(); ctx.clearRect(0,0,W,TOTAL_H);
    for(let i=0; i<6; i++){ 
        const p=players[i]; if(p.x<-500)continue;
        
        ctx.fillStyle=teamColors[p.team*2+1]; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill();
        ctx.strokeStyle = (p.kick > 0 || p.auraVisualTimer > 0) ? "#FFF" : "#000"; ctx.lineWidth=2.5; ctx.stroke();
        
        ctx.fillStyle=teamColors[p.team*2]; ctx.beginPath(); ctx.arc(p.x,p.y,11.2,0,6.28); ctx.fill();
        
        // Dimensione fissata a 12.2px
        ctx.font = "750 12.2px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle"; 
        
        ctx.fillStyle = numberColors[p.team] || '#FFFFFF';
        
        // Centratura millimetrica corretta abbassando la Y a +1.2 per compensare il font
        ctx.fillText(playerNumbers[i] || (i + 1), p.x, p.y + 1.2);
        
        ctx.textBaseline = "alphabetic"; 
        ctx.fillStyle=(i===mySlot)?"yellow":"white"; ctx.font="bold 12px sans-serif"; 
        
        ctx.fillText(playerNames[i],p.x,p.y-p.r-8);
        
        if(i===mySlot && p.kickCharge>0){ ctx.strokeStyle="#ffff00"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(p.x,p.y,p.r+4,0,(Math.PI*2)*p.kickCharge); ctx.stroke(); }
    } 
    ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 6.28); ctx.fill(); ctx.strokeStyle="#000"; ctx.lineWidth=2; ctx.stroke();
    const myP=players[mySlot];
    if(myP && gameStarted){ 
        const aEl = document.getElementById('aura-status'); const remainingAura = Math.ceil((30000 - (now - myP.lastAuraTime))/1000);
        aEl.innerText = remainingAura > 0 ? "L1: " + remainingAura + "s" : "L1: OK";
        const bEl = document.getElementById('timer-boost'); if (now >= myP.boostReadyTime) { bEl.innerText = "BST: " + Math.ceil((myP.boostRemaining/1200)*100) + "%"; bEl.style.color = "#00FF00"; }
        else { bEl.innerText = "BST: " + Math.ceil((myP.boostReadyTime-now)/1000) + "s"; bEl.style.color = "white"; }
        if(myP.kickCharge>0){ document.getElementById('kick-bar-container').style.display='block'; document.getElementById('kick-bar-fill').style.width=(myP.kickCharge*100)+'%'; }
        else document.getElementById('kick-bar-container').style.display='none';
    } 
    if(goalMsg.timer>0){ ctx.font="bold 80px sans-serif"; ctx.textAlign="center"; ctx.fillStyle="white"; ctx.fillText(goalMsg.text,MID_X,MID_Y_GAME); }
    document.getElementById('live-score').innerText=score[0]+" - "+score[1];
}

function handleNameChange(i) { const n = document.getElementById('name'+i).value || "P"+(i+1); if(isHost){ playerNames[i]=n; refreshLobbyState(); } else if(i===mySlot){ playerNames[i]=n; if(guestConn?.open) guestConn.send({type:'updateName', slot:mySlot, name:n}); } }

function handleNumberChange(i) { const num = document.getElementById('num'+i).value || (i+1).toString(); if(isHost){ playerNumbers[i]=num; refreshLobbyState(); } else if(i===mySlot){ playerNumbers[i]=num; if(guestConn?.open) guestConn.send({type:'updateNumber', slot:mySlot, number:num}); } }

function updateTeamColor(idx, val) {
    if(!isHost) return;
    teamColors[idx] = val;
    const previewIds = ['preview-t1-c1','preview-t1-c2','preview-t2-c1','preview-t2-c2'];
    document.getElementById(previewIds[idx]).style.backgroundColor = val;
    refreshLobbyState();
}

function updateNumberColor(teamIdx, val) {
    if(!isHost) return;
    numberColors[teamIdx] = val;
    const previewIds = ['preview-t1-num', 'preview-t2-num'];
    document.getElementById(previewIds[teamIdx]).style.backgroundColor = val;
    refreshLobbyState();
}

function refreshLobbyState() { 
    let realPlayers = isHost ? (connections.length + 1) : activeCount; 
    for(let i=0; i<6; i++) { 
        const el = document.getElementById('slot'+i), input = document.getElementById('name'+i), numInput = document.getElementById('num'+i); if(!el) continue;
        let isActive = i < realPlayers; if (isHost && realPlayers === 1 && i === 1) { isActive = true; if (document.activeElement !== input) input.value = "BOT"; playerNames[i] = "BOT"; } else { if (document.activeElement !== input) { if (isActive && (playerNames[i] === "BOT" || !playerNames[i])) { playerNames[i] = "P" + (i + 1); } input.value = playerNames[i] || "P" + (i + 1); } }
        if (document.activeElement !== numInput) { numInput.value = playerNumbers[i] || (i + 1).toString(); }
        el.className = 'p-slot' + (isActive ? ' active' : '') + (playerTeams[i] === 0 ? ' team-0' : ' team-1') + (i === mySlot ? ' is-me' : ''); 
        input.readOnly = !isHost && (i !== mySlot); numInput.readOnly = !isHost && (i !== mySlot); document.getElementById('label'+i).innerText = (i === 0) ? "(HOST)" : ((i === mySlot) ? "(TU)" : ""); 
    } 
    if(isHost) sendToAll({ type: 'lobbyUpdate', count: connections.length, colors: teamColors, numColors: numberColors, teams: playerTeams, names: playerNames, numbers: playerNumbers }); 
}

function initColorPickers() { 
    if(!isHost) return; 
    document.getElementById('host-controls').style.display='flex'; 
    const selectIds = ['select-t1-c1','select-t1-c2','select-t2-c1','select-t2-c2','select-t1-num','select-t2-num'];
    const previewIds = ['preview-t1-c1','preview-t1-c2','preview-t2-c1','preview-t2-c2','preview-t1-num','preview-t2-num'];

    selectIds.forEach((id, idx) => {
        const sel = document.getElementById(id);
        if(sel.options.length === 0) {
            COLORS_50.forEach(col => {
                const opt = document.createElement('option');
                opt.value = col;
                opt.text = col;
                opt.style.backgroundColor = col;
                const r = parseInt(col.slice(1,3), 16), g = parseInt(col.slice(3,5), 16), b = parseInt(col.slice(5,7), 16);
                opt.style.color = (r*0.299 + g*0.587 + b*0.114) > 186 ? 'black' : 'white';
                sel.appendChild(opt);
            });
        }
        if(idx < 4) {
            sel.value = teamColors[idx];
            document.getElementById(previewIds[idx]).style.backgroundColor = teamColors[idx];
        } else {
            sel.value = numberColors[idx - 4];
            document.getElementById(previewIds[idx]).style.backgroundColor = numberColors[idx - 4];
        }
    });
}

function startGame() { if(isHost){ score=[0,0]; for(let i=0; i<6; i++) players[i].team=playerTeams[i]; let currentPlayers = connections.length + 1; if (currentPlayers === 1) currentPlayers = 2; resetPos(true); gameStarted=true; document.getElementById('menu-overlay').style.display="none"; document.getElementById('esc-btn').style.display="flex"; sendToAll({ type:'start', activeCount: currentPlayers }); } }
function backToLobby() { gameStarted=false; document.getElementById('menu-overlay').style.display="flex"; document.getElementById('esc-btn').style.display="none"; if(isHost){ sendToAll({type:'stop'}); refreshLobbyState(); } }
function sendToAll(data) { connections.forEach(c => { if(c.open) c.send(data); }); }
function togglePlayerTeam(i){ if(isHost){playerTeams[i]=1-playerTeams[i]; refreshLobbyState();}}
function toggleFullscreen() { if (audioCtx.state === 'suspended') audioCtx.resume(); const c = document.getElementById('game-container'); if (!document.fullscreenElement) { const requestFS = c.requestFullscreen || c.webkitRequestFullscreen || c.mozRequestFullScreen || c.msRequestFullscreen; if (requestFS) requestFS.call(c).then(() => { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(e => {}); }); } else if (document.exitFullscreen) document.exitFullscreen(); }

window.addEventListener('keydown', e => { if (audioCtx.state === 'suspended') audioCtx.resume(); rawKeys[e.code]=true; if(e.code === 'Escape' && gameStarted) backToLobby(); });
window.addEventListener('keyup', e => rawKeys[e.code]=false);
</script>
