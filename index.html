<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FISHBALL 2D PRO - Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #2e7d32; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        #bgCanvas { z-index: 1; }
        #gameCanvas { z-index: 2; }
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(5px); }
        .lobby-box { background: #222; padding: 25px; border-radius: 20px; border: 1px solid #444; text-align: center; min-width: 500px; }
        @media (max-width: 600px) { .lobby-box { min-width: 90%; padding: 15px; } }
        .team-settings { display: flex; justify-content: space-around; margin: 15px 0; gap: 10px; }
        .team-box { background: #333; padding: 10px; border-radius: 12px; flex: 1; border: 1px solid #444; }
        .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 8px; justify-items: center; }
        .color-dot { width: 18px; height: 18px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .color-dot.active { border: 2px solid white; transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,0.6); }
        .player-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .p-slot { opacity: 0.4; filter: grayscale(1); transition: 0.3s; padding: 8px; border-radius: 8px; border: 1px solid transparent; display: flex; align-items: center; justify-content: space-between; color: #777; font-weight: normal; cursor: pointer; }
        .p-slot.active { opacity: 1; filter: grayscale(0); color: #fff; font-weight: bold; }
        .p-slot.is-me { color: #ffeb3b !important; border: 1px solid rgba(255, 235, 59, 0.3); }
        .p-slot.team-0 { border-left: 5px solid #FF0000; background: rgba(255,0,0,0.1); }
        .p-slot.team-1 { border-left: 5px solid #0000FF; background: rgba(0,0,255,0.1); }
        .name-input { background: transparent; border: none; color: inherit; border-radius: 4px; padding: 2px 5px; width: 100px; font-size: 0.9em; font-weight: inherit; text-align: center; outline: none; }
        .p-slot.active .name-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); cursor: text; }
        #fs-btn { display: none; background: #2196F3; color: white; border: none; padding: 15px 25px; font-size: 1.1em; cursor: pointer; border-radius: 30px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; width: 100%; }
        #start-btn { background: #4CAF50; color: white; border: none; padding: 15px 50px; font-size: 1.2em; cursor: pointer; border-radius: 30px; display: none; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        #esc-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.7); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; z-index: 100; display: none; align-items: center; justify-content: center; }
        .ui-bottom-right { position: absolute; bottom: 30px; right: 30px; text-align: right; pointer-events: none; z-index: 5; font-family: monospace; }
        #live-score { font-size: 3.5em; font-weight: 900; line-height: 1; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .timer-display { font-size: 2em; font-weight: 900; margin-bottom: 10px; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); transition: color 0.2s; letter-spacing: 1px; }
        #kick-bar-container { width: 100px; height: 10px; background: #444; border: 1px solid #fff; margin-top: 5px; display: none; }
        #kick-bar-fill { height: 100%; width: 0%; background: #ffff00; }
        #aura-status { font-size: 2em; color: #ffcc80; font-weight: 900; margin-bottom: 5px; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); letter-spacing: 1px; }
        input#link-input { background: #1a1a1a; color: #00ff00; border: 1px solid #333; padding: 10px; width: 90%; margin-top: 10px; cursor: pointer; border-radius: 5px; font-family: monospace; text-align: center; }
    </style>
</head>
<body>

    <div id="game-container">
        <button id="esc-btn" onclick="backToLobby()">✕</button>
        <canvas id="bgCanvas" width="956" height="720"></canvas>
        <canvas id="gameCanvas" width="956" height="720"></canvas>
        <div id="menu-overlay">
            <div class="lobby-box">
                <h1 style="margin:0; color:#4CAF50; letter-spacing: 2px; font-size: 1.5em;">FISHBALL 2D PRO</h1>
                <div id="status-text" style="margin-bottom: 10px; font-size: 0.9em; color: #aaa;">Inizializzazione...</div>
                <button id="fs-btn" onclick="toggleFullscreen()">ADATTA SCHERMO</button>
                
                <div class="team-settings" id="host-controls" style="display:none;">
                    <div class="team-box"><b style="color:#ff4444; font-size: 0.8em;">SQUADRA 1</b><div class="color-grid" id="picker-t1-c1"></div><div class="color-grid" id="picker-t1-c2"></div></div>
                    <div class="team-box"><b style="color:#4444ff; font-size: 0.8em;">SQUADRA 2</b><div class="color-grid" id="picker-t2-c1"></div><div class="color-grid" id="picker-t2-c2"></div></div>
                </div>

                <div class="player-status-grid">
                    <div id="slot0" class="p-slot team-0" onclick="togglePlayerTeam(0)"><input type="text" class="name-input" id="name0" value="TU" maxlength="8" oninput="handleNameChange(0)" onclick="event.stopPropagation()"><span id="label0" style="font-size: 0.7em;"></span></div> 
                    <div id="slot1" class="p-slot team-1" onclick="togglePlayerTeam(1)"><input type="text" class="name-input" id="name1" value="BOT" maxlength="8" oninput="handleNameChange(1)" onclick="event.stopPropagation()"><span id="label1" style="font-size: 0.7em;"></span></div>
                    <div id="slot2" class="p-slot team-0" onclick="togglePlayerTeam(2)"><input type="text" class="name-input" id="name2" value="P3" maxlength="8" oninput="handleNameChange(2)" onclick="event.stopPropagation()"><span id="label2" style="font-size: 0.7em;"></span></div> 
                    <div id="slot3" class="p-slot team-1" onclick="togglePlayerTeam(3)"><input type="text" class="name-input" id="name3" value="P4" maxlength="8" oninput="handleNameChange(3)" onclick="event.stopPropagation()"><span id="label3" style="font-size: 0.7em;"></span></div>
                    <div id="slot4" class="p-slot team-0" onclick="togglePlayerTeam(4)"><input type="text" class="name-input" id="name4" value="P5" maxlength="8" oninput="handleNameChange(4)" onclick="event.stopPropagation()"><span id="label4" style="font-size: 0.7em;"></span></div> 
                    <div id="slot5" class="p-slot team-1" onclick="togglePlayerTeam(5)"><input type="text" class="name-input" id="name5" value="P6" maxlength="8" oninput="handleNameChange(5)" onclick="event.stopPropagation()"><span id="label5" style="font-size: 0.7em;"></span></div>
                </div>
                <button id="start-btn" onclick="startGame()">GIOCA ORA</button>
            </div>
        </div>
        <div class="ui-bottom-right">
            <div id="aura-status">L1: OK</div>
            <div id="timer-boost" class="timer-display"></div>
            <div id="kick-bar-container"><div id="kick-bar-fill"></div></div>
            <div id="live-score">0 - 0</div>
        </div>
    </div>

<script>
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if (isMobile) document.getElementById('fs-btn').style.display = 'block';

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let lastSoundTime = 0;
function playHitSound(freq = 60) {
    const now = audioCtx.currentTime;
    if (now - lastSoundTime < 0.1) return;
    lastSoundTime = now;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(now + 0.1);
}

const PRESET_COLORS = ['#FF0000', '#710808', '#8E101D', '#FF4500', '#FFA500', '#FFD700', '#FFFF00', '#CCFF00', '#228B22', '#00FA9A', '#87CEEB', '#00BFFF', '#0000FF', '#4B0082', '#8A2BE2', '#FF00FF', '#FF1493', '#FFC0CB', '#FFFFFF', '#C0C0C0', '#808080', '#404040', '#000000', '#8B4513', '#D2691E', '#F4A460', '#3E2723', '#1A237E', '#32CD32', '#BF360C', '#4E342E', '#263238'];
let teamColors = [PRESET_COLORS[0], PRESET_COLORS[0], PRESET_COLORS[12], PRESET_COLORS[12]];
let playerTeams = [0, 1, 0, 1, 0, 1];
let playerNames = ["TU", "BOT", "P3", "P4", "P5", "P6"];

const W = 956, OFFSET_TOP = 130, TOTAL_H = 720, H_GAME = TOTAL_H - OFFSET_TOP - 20;
const MID_X = W / 2, MID_Y_GAME = OFFSET_TOP + (H_GAME / 2), GOAL_SIZE_HALF = 68;

let players = Array.from({length: 6}, () => ({ 
    x: -1000, y: -1000, tx: -1000, ty: -1000, vx: 0, vy: 0, r: 16, m: 6, kick: 0, 
    boostRemaining: 1200, boostReadyTime: 0, isBoosting: false,
    kickCharge: 0, kickStartTime: 0, shotBufferTime: 0, bufferedCharge: 0, wasKickBasePressed: false, team: 0,
    lastAuraTime: 0, auraActiveUntil: 0, auraVisualTimer: 0, isBot: false
}));

let ball = { x: MID_X, y: MID_Y_GAME, tx: MID_X, ty: MID_Y_GAME, vx: 0, vy: 0, r: 10, m: 1 };
let score = [0, 0], goalMsg = { text: "", timer: 0 }, isGoalProcessed = false, gameStarted = false, isHost = false, activeCount = 1, mySlot = 0, lastSync = 0;
let pendingInputs = [], inputSequenceNumber = 0;
const keys = { ax: 0, ay: 0, kickBase: false, kickCharge: false, boost: false, aura: false }, rawKeys = {}, allRemoteKeys = {};
const posts = [{x:45, y:MID_Y_GAME-GOAL_SIZE_HALF, r:5.6}, {x:45, y:MID_Y_GAME+GOAL_SIZE_HALF, r:5.6}, {x:W-45, y:MID_Y_GAME-GOAL_SIZE_HALF, r:5.6}, {x:W-45, y:MID_Y_GAME+GOAL_SIZE_HALF, r:5.6}];

let bannerLoaded = false, topImage = new Image();
topImage.onload = () => { bannerLoaded = true; drawField(); };
topImage.src = 'banner.png';

const peer = new Peer({ debug: 1 });
let connections = [], guestConn = null;

peer.on('open', id => {
    const joinId = new URLSearchParams(window.location.search).get('join');
    if (joinId) { 
        isHost = false; 
        document.getElementById('status-text').innerText = "Connessione...";
        guestConn = peer.connect(joinId, { reliable: true }); 
        setupGuest(guestConn); 
    } else { 
        isHost = true; 
        mySlot = 0; 
        const inviteLink = window.location.origin + window.location.pathname + "?join=" + id;
        document.getElementById('status-text').innerHTML = `ID Lobby: <input type="text" id="link-input" value="${inviteLink}" readonly onclick="this.select(); document.execCommand('copy');">`; 
        document.getElementById('start-btn').style.display = "inline-block"; 
        initColorPickers(); refreshLobbyState(); drawField(); requestAnimationFrame(gameLoop); 
    }
});

peer.on('connection', conn => {
    conn.on('open', () => {
        if (connections.length >= 5) { conn.close(); return; }
        conn.on('data', data => { 
            if(data.type === 'join') { 
                if (!connections.find(c => c.peer === conn.peer)) { 
                    connections.push(conn); 
                    conn.send({ type: 'initSlot', slot: connections.indexOf(conn) + 1, colors: teamColors, teams: playerTeams, names: playerNames }); 
                    refreshLobbyState(); 
                } 
            }
            if(data.type === 'input') { 
                const idx = connections.indexOf(conn) + 1; 
                allRemoteKeys[idx] = data.keys; 
                allRemoteKeys[idx].lastSequence = data.sequence; 
            }
            if(data.type === 'updateName') { playerNames[data.slot] = data.name; refreshLobbyState(); }
        });
        conn.on('close', () => { connections = connections.filter(c => c !== conn); refreshLobbyState(); });
    });
});

function setupGuest(conn) {
    conn.on('open', () => { conn.send({ type: 'join' }); });
    conn.on('data', data => {
        if (data.type === 'initSlot') { mySlot = data.slot; teamColors = data.colors; playerTeams = data.teams; playerNames = data.names; document.getElementById('status-text').innerText = "In attesa dell'Host..."; refreshLobbyState(); }
        if (data.type === 'lobbyUpdate') { activeCount = data.count + 1; teamColors = data.colors; playerTeams = data.teams; playerNames = data.names; refreshLobbyState(); }
        if (data.type === 'start') { resetPos(true); gameStarted = true; document.getElementById('menu-overlay').style.display = "none"; document.getElementById('esc-btn').style.display = "flex"; }
        if (data.type === 'sync') { 
            ball.tx = data.ball.x; ball.ty = data.ball.y; score = data.score;
            const now = Date.now();
            data.players.forEach((p, i) => { 
                if(players[i]) { 
                    if (i === mySlot) {
                        players[i].x = p.x; players[i].y = p.y; players[i].vx = p.vx; players[i].vy = p.vy;
                        pendingInputs = pendingInputs.filter(input => input.sequence > data.lastSequence);
                        pendingInputs.forEach(input => { movePlayer(players[i], input.keys, 16.6); checkLimits(players[i], false); });
                    } else { players[i].tx = p.x; players[i].ty = p.y; }
                    players[i].kick = p.kick; players[i].boostReadyTime = now + p.boostReadyRemaining; 
                    players[i].boostRemaining = p.boostRemaining; players[i].isBoosting = p.isBoosting; 
                    players[i].team = p.team; players[i].kickCharge = p.kickCharge;
                    players[i].lastAuraTime = p.lastAuraTime; players[i].auraActiveUntil = p.auraActiveUntil;
                    players[i].auraVisualTimer = p.auraVisualTimer;
                } 
            });
        }
        if (data.type === 'goal') { goalMsg = { text: data.text, timer: 120 }; score = data.score; }
        if (data.type === 'stop') backToLobby();
    });
    setInterval(() => {
        if (!gameStarted || mySlot === 0) return;
        updateInput(); inputSequenceNumber++;
        const inputFrame = { sequence: inputSequenceNumber, keys: JSON.parse(JSON.stringify(keys)) };
        pendingInputs.push(inputFrame);
        if(conn.open) conn.send({type:'input', keys: inputFrame.keys, sequence: inputSequenceNumber});
        movePlayer(players[mySlot], inputFrame.keys, 16.6); checkLimits(players[mySlot], false);
    }, 16.6); 
    requestAnimationFrame(gameLoop);
}

function checkLimits(o, isBall) {
    const limitYTop = OFFSET_TOP + 15, limitYBottom = OFFSET_TOP + H_GAME - 15;
    const goalTop = MID_Y_GAME - GOAL_SIZE_HALF, goalBottom = MID_Y_GAME + GOAL_SIZE_HALF;
    const limitXLeft = 45, limitXRight = W - 45;
    let bounceFactor = 0.385;
    if (isBall) {
        let speed = Math.sqrt(o.vx * o.vx + o.vy * o.vy);
        if (speed > 3.5) bounceFactor = Math.min(0.66, 0.385 + (speed * 0.033));
    }
    if (isBall) {
        if (o.y - o.r < limitYTop) { o.y = limitYTop + o.r; o.vy = Math.abs(o.vy) * bounceFactor; }
        else if (o.y + o.r > limitYBottom) { o.y = limitYBottom - o.r; o.vy = -Math.abs(o.vy) * bounceFactor; }
        if (o.x - o.r < limitXLeft) {
            if (o.y < goalTop || o.y > goalBottom) { o.x = limitXLeft + o.r; o.vx = Math.abs(o.vx) * bounceFactor; }
            else { if (o.x < 15 + o.r) o.x = 15 + o.r; }
        } else if (o.x + o.r > limitXRight) {
            if (o.y < goalTop || o.y > goalBottom) { o.x = limitXRight - o.r; o.vx = -Math.abs(o.vx) * bounceFactor; }
            else { if (o.x > W - 15 - o.r) o.x = W - 15 - o.r; }
        }
    } else {
        const margin = o.r * 0.35;
        o.y = Math.max(limitYTop + margin, Math.min(o.y, limitYBottom - margin));
        if (o.x < limitXLeft + margin && (o.y < goalTop || o.y > goalBottom)) o.x = limitXLeft + margin;
        if (o.x > limitXRight - margin && (o.y < goalTop || o.y > goalBottom)) o.x = limitXRight - margin;
        if (o.x < 15 + o.r) o.x = 15 + o.r;
        if (o.x > W - 15 - o.r) o.x = W - 15 - o.r;
    }
}

function resolve(c1, c2, isPost = false) { 
    if (!c1 || !c2 || c1.x < -500 || c2.x < -500) return;
    let dx = c2.x - c1.x, dy = c2.y - c1.y, dist = Math.sqrt(dx*dx + dy*dy), minDist = c1.r + c2.r;
    if (dist < minDist && dist > 0) { 
        let nx = dx / dist, ny = dy / dist, overlap = minDist - dist;
        if (isPost) { c2.x += nx * overlap; c2.y += ny * overlap; }
        else { c1.x -= nx * overlap * 0.5; c1.y -= ny * overlap * 0.5; c2.x += nx * overlap * 0.5; c2.y += ny * overlap * 0.5; }
        let relVX = c2.vx - (isPost ? 0 : c1.vx), relVY = c2.vy - (isPost ? 0 : c1.vy), dot = relVX*nx + relVY*ny;
        if (dot < 0) { 
            if ((c1 === ball || c2 === ball) && !isPost && Math.abs(dot) > 1.2) playHitSound();
            let bounce = 0.85; 
            if (isPost) {
                let speed = Math.sqrt(c2.vx * c2.vx + c2.vy * c2.vy);
                bounce = (speed > 3.5) ? 0.55 : 0.275;
            }
            let m1 = isPost ? 100 : c1.m, m2 = c2.m;
            let impulse = -(1 + bounce) * dot / (1/m1 + 1/m2);
            c2.vx += (impulse * nx) / m2; c2.vy += (impulse * ny) / m2;
            if (!isPost) { c1.vx -= (impulse * nx) / m1; c1.vy -= (impulse * ny) / m1; }
        } 
    } 
}

function updateInput() {
    let kx = 0, ky = 0; keys.kickBase = keys.kickCharge = keys.boost = keys.aura = false;
    if (document.activeElement.tagName === 'INPUT') return;
    if (rawKeys['ArrowLeft'] || rawKeys['KeyA']) kx--; if (rawKeys['ArrowRight'] || rawKeys['KeyD']) kx++;
    if (rawKeys['ArrowUp'] || rawKeys['KeyW']) ky--; if (rawKeys['ArrowDown'] || rawKeys['KeyS']) ky++;
    if (rawKeys['Space']) keys.kickBase = true;
    if (rawKeys['KeyC']) keys.kickCharge = true;
    if (rawKeys['ShiftLeft']) keys.boost = true;
    if (rawKeys['KeyV']) keys.aura = true; 
    if (kx !== 0 || ky !== 0) { let kmag = Math.sqrt(kx * kx + ky * ky); kx /= kmag; ky /= kmag; }
    keys.ax = kx; keys.ay = ky;
}

function movePlayer(p, input, dt) { 
    if(!p || p.x < -500 || goalMsg.timer > 0) return;
    const now = Date.now(); 

    if (now < p.auraActiveUntil) {
        p.vx *= 0.995; p.vy *= 0.995; p.x += p.vx; p.y += p.vy;
        p.kickCharge = 0; p.kickStartTime = 0; p.isBoosting = false;
        return; 
    }

    if (input.aura && now - p.lastAuraTime > 30000) {
        let targetsInRange = [];
        for(let i=0; i<6; i++) {
            let target = players[i];
            if (target && target !== p && target.team !== p.team && target.x > -500) {
                let dx = target.x - p.x, dy = target.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < p.r + target.r + 15) { targetsInRange.push(target); }
            }
        }
        if (targetsInRange.length > 0) {
            targetsInRange[0].auraActiveUntil = now + 1200;
            p.lastAuraTime = now;
            p.auraVisualTimer = 15;
            if (isHost) playHitSound(200);
        }
    }

    if (p.auraVisualTimer > 0) p.auraVisualTimer--;

    if (input.boost && now >= p.boostReadyTime && p.boostRemaining > 0) { 
        p.isBoosting = true; p.boostRemaining -= dt; 
        if (p.boostRemaining <= 0) { p.boostRemaining = 0; p.boostReadyTime = now + 12000; p.isBoosting = false; } 
    } else { p.isBoosting = false; }
    
    if (now >= p.boostReadyTime && p.boostRemaining <= 0) { p.boostRemaining = 1200; }

    let accel = p.isBoosting ? 0.14 : 0.08; 
    p.vx += input.ax * accel; p.vy += input.ay * accel; 
    p.vx *= 0.94; p.vy *= 0.94; 
    p.x += p.vx; p.y += p.vy;

    if (isHost) {
        let dx = ball.x - p.x, dy = ball.y - p.y, d = Math.sqrt(dx*dx + dy*dy);
        let inRange = d < p.r + ball.r + 12;
        if (input.kickBase) {
            if (!p.wasKickBasePressed) { if (inRange) executeShot(p, dx, dy, d, 4.05); else { p.shotBufferTime = now + 250; p.bufferedCharge = 4.05; } }
            p.wasKickBasePressed = true;
        } else { p.wasKickBasePressed = false; }
        if (input.kickCharge) { if (p.kickStartTime === 0) p.kickStartTime = now; p.kickCharge = Math.min(1, (now - p.kickStartTime) / 800); } 
        else if (p.kickStartTime > 0) { 
            let fP = 4.05 + (p.kickCharge * 2.03); if (inRange) executeShot(p, dx, dy, d, fP); else { p.shotBufferTime = now + 400; p.bufferedCharge = fP; } 
            p.kickStartTime = 0; p.kickCharge = 0; 
        }
        if (p.shotBufferTime > now && inRange) { executeShot(p, dx, dy, d, p.bufferedCharge); p.shotBufferTime = 0; }
    }
    if (p.kick > 0) p.kick--;
}

function executeShot(p, dx, dy, d, power) { ball.vx = (dx/d) * power; ball.vy = (dy/d) * power; p.kick = 15; p.shotBufferTime = 0; if (isHost) playHitSound(); }

function gameLoop(t) {
    if (gameStarted) {
        if (isHost) {
            const now = Date.now(); updateInput();
            if (goalMsg.timer <= 0) {
                if ((ball.x < 33 || ball.x > W - 33) && ball.y > MID_Y_GAME - GOAL_SIZE_HALF && ball.y < MID_Y_GAME + GOAL_SIZE_HALF) { 
                    if (!isGoalProcessed) { 
                        isGoalProcessed = true; if (ball.x < 33) score[1]++; else score[0]++; 
                        goalMsg = { text: "GOAL!", timer: 120 }; ball.vx = ball.vy = 0;
                        sendToAll({ type: 'goal', text: "GOAL!", score }); setTimeout(() => resetPos(), 2000); 
                    }
                }
                if (!isGoalProcessed) {
                    movePlayer(players[0], keys, 16.6); 
                    for(let i=1; i<6; i++) {
                        if (players[i].isBot) {
                            let bdx = ball.x - players[i].x, bdy = ball.y - players[i].y, bd = Math.sqrt(bdx*bdx + bdy*bdy);
                            let bInput = { ax: bdx/bd, ay: bdy/bd, kickBase: bd < 40, kickCharge: false, boost: false, aura: false };
                            movePlayer(players[i], bInput, 16.6);
                        } else if(allRemoteKeys[i]) {
                            movePlayer(players[i], allRemoteKeys[i], 16.6);
                        }
                    }
                    ball.vx *= 0.9899; ball.vy *= 0.9899; ball.x += ball.vx; ball.y += ball.vy;
                    for(let i=0; i<6; i++) { 
                        if (players[i].x < -500) continue;
                        for(let j=i+1; j<6; j++) { if(players[j].x > -500) resolve(players[i], players[j]); }
                        resolve(players[i], ball); posts.forEach(post => resolve(post, players[i], true)); checkLimits(players[i], false); 
                    }
                    posts.forEach(p => resolve(p, ball, true)); checkLimits(ball, true);
                }
            }
            if (t - lastSync > 30) { 
                sendToAll({ type: 'sync', ball: {x: ball.x, y: ball.y}, score, players: players.map((p) => ({ x: p.x, y: p.y, vx: p.vx, vy: p.vy, kick: p.kick, team: p.team, boostReadyRemaining: Math.max(0, p.boostReadyTime - now), boostRemaining: p.boostRemaining, isBoosting: p.isBoosting, kickCharge: p.kickCharge, lastAuraTime: p.lastAuraTime, auraActiveUntil: p.auraActiveUntil, auraVisualTimer: p.auraVisualTimer })) }); 
                lastSync = t; 
            }
        } else {
            ball.x += (ball.tx - ball.x) * 0.35; ball.y += (ball.ty - ball.y) * 0.35;
            for(let i=0; i<6; i++) if(i !== mySlot) { players[i].x += (players[i].tx - players[i].x) * 0.35; players[i].y += (players[i].ty - players[i].y) * 0.35; }
        }
    }
    if (goalMsg.timer > 0) goalMsg.timer--; draw(); requestAnimationFrame(gameLoop);
}

function resetPos(full) {
    isGoalProcessed = false; ball.x = ball.tx = MID_X; ball.y = ball.ty = MID_Y_GAME; ball.vx = ball.vy = 0;
    let realPlayers = isHost ? (connections.length + 1) : activeCount;
    // Il BOT gioca solo se c'è un unico giocatore umano in totale
    if (realPlayers === 1) { players[1].isBot = true; if(isHost) playerNames[1] = "BOT"; }
    else { players[1].isBot = false; }
    
    for(let i=0; i<6; i++) if(players[i]) { 
        players[i].vx = players[i].vy = 0; players[i].x = players[i].tx = -1000; 
        if(full) { players[i].boostReadyTime = 0; players[i].boostRemaining = 1200; players[i].lastAuraTime = 0; players[i].auraActiveUntil = 0; players[i].auraVisualTimer = 0; } 
    }
    const spawnX = 250, spawnYOffset = 120;
    players[0].x = players[0].tx = spawnX; players[0].y = players[0].ty = MID_Y_GAME;
    if (players[1].isBot || realPlayers > 1) { players[1].x = players[1].tx = W - spawnX; players[1].y = players[1].ty = MID_Y_GAME; }
    if(realPlayers > 2) { players[2].x = players[2].tx = 120; players[2].y = players[2].ty = MID_Y_GAME - spawnYOffset; }
    if(realPlayers > 3) { players[3].x = players[3].tx = W - 120; players[3].y = players[3].ty = MID_Y_GAME - spawnYOffset; }
    if(realPlayers > 4) { players[4].x = players[4].tx = 120; players[4].y = players[4].ty = MID_Y_GAME + spawnYOffset; }
    if(realPlayers > 5) { players[5].x = players[5].tx = W - 120; players[5].y = players[5].ty = MID_Y_GAME + spawnYOffset; }
}

function drawField() { 
    const bgCtx=document.getElementById('bgCanvas').getContext('2d'); 
    bgCtx.fillStyle="#2e7d32"; bgCtx.fillRect(0,0,W,TOTAL_H);
    if(bannerLoaded) bgCtx.drawImage(topImage,0,0,W,OFFSET_TOP);
    const fW=W-90, sW=fW/9; 
    for(let i=0; i<9; i++){bgCtx.fillStyle=(i%2===0)?"#2e7d32":"#388e3c"; bgCtx.fillRect(45+(i*sW),OFFSET_TOP+15,sW,H_GAME-30);}
    bgCtx.strokeStyle="rgba(255,255,255,0.5)"; bgCtx.lineWidth=4; 
    bgCtx.strokeRect(45,OFFSET_TOP+15,W-90,H_GAME-30);
    bgCtx.strokeRect(45,MID_Y_GAME-100,80,200); bgCtx.strokeRect(W-125,MID_Y_GAME-100,80,200);
    bgCtx.beginPath(); bgCtx.moveTo(MID_X,OFFSET_TOP+15); bgCtx.lineTo(MID_X,OFFSET_TOP+H_GAME-15); bgCtx.stroke();
    bgCtx.beginPath(); bgCtx.arc(MID_X,MID_Y_GAME,70,0,6.28); bgCtx.stroke();
    bgCtx.strokeStyle="#FFF"; bgCtx.strokeRect(15,MID_Y_GAME-GOAL_SIZE_HALF,30,GOAL_SIZE_HALF*2); bgCtx.strokeRect(W-45,MID_Y_GAME-GOAL_SIZE_HALF,30,GOAL_SIZE_HALF*2);
    posts.forEach(p=>{bgCtx.fillStyle="#FFF"; bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,6.28); bgCtx.fill();});
}

function draw() { 
    const ctx=document.getElementById('gameCanvas').getContext('2d'), now=Date.now(); ctx.clearRect(0,0,W,TOTAL_H);
    for(let i=0; i<6; i++){ 
        const p=players[i]; if(p.x<-500)continue;
        ctx.fillStyle=teamColors[p.team*2+1]; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill();
        ctx.strokeStyle = (p.kick > 0 || p.auraVisualTimer > 0) ? "#FFF" : "#000"; 
        ctx.lineWidth=2.5; ctx.stroke();
        ctx.fillStyle=teamColors[p.team*2]; ctx.beginPath(); ctx.arc(p.x,p.y,11.2,0,6.28); ctx.fill();
        ctx.fillStyle=(i===mySlot)?"yellow":"white"; ctx.font="bold 12px sans-serif"; ctx.textAlign="center"; ctx.fillText(playerNames[i],p.x,p.y-p.r-8);
        if(i===mySlot && p.kickCharge>0){ ctx.strokeStyle="#ffff00"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(p.x,p.y,p.r+4,0,(Math.PI*2)*p.kickCharge); ctx.stroke(); }
    } 
    ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 6.28); ctx.fill(); ctx.strokeStyle="#000"; ctx.lineWidth=2; ctx.stroke();
    const myP=players[mySlot];
    if(myP && gameStarted){ 
        const aEl = document.getElementById('aura-status');
        const remainingAura = Math.ceil((30000 - (now - myP.lastAuraTime))/1000);
        if (remainingAura > 0) { aEl.innerText = "L1: " + remainingAura + "s"; aEl.style.color = "#ffcc80"; }
        else { aEl.innerText = "L1: OK"; aEl.style.color = "#ffcc80"; }
        const bEl = document.getElementById('timer-boost');
        if (now >= myP.boostReadyTime) { bEl.innerText = "BST: " + Math.ceil((myP.boostRemaining/1200)*100) + "%"; bEl.style.color = "#00FF00"; }
        else { bEl.innerText = "BST: " + Math.ceil((myP.boostReadyTime-now)/1000) + "s"; bEl.style.color = "white"; }
        if(myP.kickCharge>0){ document.getElementById('kick-bar-container').style.display='block'; document.getElementById('kick-bar-fill').style.width=(myP.kickCharge*100)+'%'; }
        else document.getElementById('kick-bar-container').style.display='none';
    } 
    if(goalMsg.timer>0){ ctx.font="bold 80px sans-serif"; ctx.textAlign="center"; ctx.fillStyle="white"; ctx.fillText(goalMsg.text,MID_X,MID_Y_GAME); }
    document.getElementById('live-score').innerText=score[0]+" - "+score[1];
}

function handleNameChange(i) {
    const n = document.getElementById('name'+i).value || "P"+(i+1);
    if(isHost){ playerNames[i]=n; refreshLobbyState(); }
    else if(i===mySlot){ playerNames[i]=n; if(guestConn?.open) guestConn.send({type:'updateName', slot:mySlot, name:n}); }
}

function refreshLobbyState() { 
    let realPlayers = isHost ? (connections.length + 1) : activeCount; 
    for(let i=0; i<6; i++) { 
        const el = document.getElementById('slot'+i), input = document.getElementById('name'+i); if(!el) continue;
        
        // MODIFICA CRUCIALE: Se c'è un Guest (realPlayers > 1), il BOT sparisce dalla lobby
        let isActive = i < realPlayers;
        if (isHost && realPlayers === 1 && i === 1) isActive = true; // Mostra BOT solo se l'host è solo
        
        el.className = 'p-slot' + (isActive ? ' active' : '') + (playerTeams[i] === 0 ? ' team-0' : ' team-1') + (i === mySlot ? ' is-me' : ''); 
        
        // Gestione nomi
        if (document.activeElement !== input) {
            if (i === 1 && realPlayers === 1 && isHost) input.value = "BOT";
            else input.value = playerNames[i] || "P" + (i+1);
        }
        
        input.readOnly = !isHost && (i !== mySlot); 
        document.getElementById('label'+i).innerText = (i === 0) ? "(HOST)" : ((i === mySlot) ? "(TU)" : ""); 
    } 
    if(isHost) sendToAll({ type: 'lobbyUpdate', count: connections.length, colors: teamColors, teams: playerTeams, names: playerNames }); 
}

function initColorPickers() { 
    if(!isHost) return; document.getElementById('host-controls').style.display='flex'; 
    ['picker-t1-c1','picker-t1-c2','picker-t2-c1','picker-t2-c2'].forEach((id,idx) => { 
        const c = document.getElementById(id); if(c.children.length===0) PRESET_COLORS.forEach(col => { 
            const d = document.createElement('div'); d.className='color-dot'; d.style.backgroundColor=col; d.dataset.color=col; 
            d.onclick=()=>{ teamColors[idx]=col; initColorPickers(); refreshLobbyState(); }; c.appendChild(d); 
        }); 
        Array.from(c.children).forEach(dot => dot.className = 'color-dot' + (teamColors[idx] === dot.dataset.color ? ' active' : ''));
    }); 
}

function startGame() { if(isHost){ score=[0,0]; for(let i=0; i<6; i++) players[i].team=playerTeams[i]; resetPos(true); gameStarted=true; document.getElementById('menu-overlay').style.display="none"; document.getElementById('esc-btn').style.display="flex"; sendToAll({type:'start'}); } }
function backToLobby() { gameStarted=false; document.getElementById('menu-overlay').style.display="flex"; document.getElementById('esc-btn').style.display="none"; if(isHost){ sendToAll({type:'stop'}); refreshLobbyState(); } }

function sendToAll(data) { connections.forEach((c, idx) => { if(c.open){ let d = JSON.parse(JSON.stringify(data)); if(d.type==='sync') d.lastSequence = allRemoteKeys[idx+1]?.lastSequence || 0; c.send(d); } }); }
function togglePlayerTeam(i){ if(isHost){playerTeams[i]=1-playerTeams[i]; refreshLobbyState();}}
function toggleFullscreen() { if (audioCtx.state === 'suspended') audioCtx.resume(); const c = document.getElementById('game-container'); if (!document.fullscreenElement) { const requestFS = c.requestFullscreen || c.webkitRequestFullscreen || c.mozRequestFullScreen || c.msRequestFullscreen; if (requestFS) requestFS.call(c).then(() => { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(e => {}); }); } else if (document.exitFullscreen) document.exitFullscreen(); }

window.addEventListener('keydown', e => { if (audioCtx.state === 'suspended') audioCtx.resume(); rawKeys[e.code]=true; if(e.code === 'Escape' && gameStarted) backToLobby(); });
window.addEventListener('keyup', e => rawKeys[e.code]=false);
</script>
