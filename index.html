<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISHBALL 3vs3 - Pro Pitch Edition (Gamepad Support)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 5px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.5); width: 1100px; height: 850px; background-color: #2e7d32; max-width: 95vw; max-height: 90vh; object-fit: contain; position: relative; }
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(5px); }
        .lobby-box { background: #222; padding: 25px; border-radius: 20px; border: 1px solid #444; text-align: center; min-width: 550px; max-height: 95vh; overflow-y: auto; }
        .team-settings { display: flex; justify-content: space-around; margin: 15px 0; gap: 10px; }
        .team-box { background: #333; padding: 10px; border-radius: 12px; flex: 1; border: 1px solid #444; font-size: 0.85em; }
        .pattern-select { width: 100%; padding: 5px; margin: 8px 0; background: #444; color: white; border: 1px solid #555; border-radius: 4px; }
        .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 5px; justify-items: center; }
        .color-dot { width: 18px; height: 18px; border-radius: 3px; cursor: pointer; border: 1px solid #222; transition: 0.1s; }
        .color-dot.active { border: 2px solid white; transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .player-status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; font-size: 0.8em; color: #666; }
        .p-slot.active { color: #4CAF50; font-weight: bold; }
        #start-btn { background: #4CAF50; color: white; border: none; padding: 12px 40px; font-size: 1.1em; cursor: pointer; border-radius: 30px; display: none; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .ui-bottom-right { position: absolute; bottom: 20px; right: 40px; text-align: right; pointer-events: none; z-index: 5; font-family: monospace; }
        #live-score { font-size: 3em; font-weight: 900; line-height: 1; }
        .timer-display { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; }
        input#link-input { background: #1a1a1a; color: #00ff00; border: 1px solid #333; padding: 8px; width: 90%; margin-top: 10px; border-radius: 5px; font-family: monospace; text-align: center; font-size: 0.8em; }
        .color-label { font-size: 0.7em; margin-top: 5px; opacity: 0.8; text-align: left; width: 100%; }
        #gamepad-status { font-size: 0.7em; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="menu-overlay">
        <div class="lobby-box">
            <h1 style="margin:0; color:#4CAF50; font-size: 1.5em;">FISHBALL 3vs3</h1>
            <div id="status-text">Generazione ID...</div>
            
            <div class="team-settings" id="host-controls" style="display:none;">
                <div class="team-box">
                    <div style="color:#ff4444; font-weight:bold;">SQUADRA 1</div>
                    <select id="pattern-t1" class="pattern-select" onchange="updateTeams()">
                        <option value="solid">Tinta Unita</option>
                        <option value="h-stripes">Righe Orizzontali</option>
                        <option value="v-stripes">Righe Verticali</option>
                        <option value="h-half">2 Fasce Orizzontali</option>
                        <option value="v-half">2 Fasce Verticali</option>
                    </select>
                    <div class="color-label">Principale / Secondario:</div>
                    <div class="color-grid" id="picker-t1-a"></div>
                    <div class="color-grid" id="picker-t1-b"></div>
                </div>
                <div class="team-box">
                    <div style="color:#4444ff; font-weight:bold;">SQUADRA 2</div>
                    <select id="pattern-t2" class="pattern-select" onchange="updateTeams()">
                        <option value="solid">Tinta Unita</option>
                        <option value="h-stripes">Righe Orizzontali</option>
                        <option value="v-stripes">Righe Verticali</option>
                        <option value="h-half">2 Fasce Orizzontali</option>
                        <option value="v-half">2 Fasce Verticali</option>
                    </select>
                    <div class="color-label">Principale / Secondario:</div>
                    <div class="color-grid" id="picker-t2-a"></div>
                    <div class="color-grid" id="picker-t2-b"></div>
                </div>
            </div>

            <div class="player-status-grid">
                <div id="slot0" class="p-slot">P1 (HOST)</div><div id="slot1" class="p-slot">P2</div><div id="slot2" class="p-slot">P3</div>
                <div id="slot3" class="p-slot">P4</div><div id="slot4" class="p-slot">P5</div><div id="slot5" class="p-slot">P6</div>
            </div>
            <button id="start-btn" onclick="startGame()">GIOCA ORA</button>
            <div id="gamepad-status">Gamepad non rilevato. Premi un tasto sul controller.</div>
        </div>
    </div>

    <div class="ui-bottom-right">
        <div id="timer-boost" class="timer-display"></div>
        <div id="timer-pwr" class="timer-display"></div>
        <div id="live-score">0 - 0</div>
    </div>

    <canvas id="gameCanvas" width="1100" height="850"></canvas>

<script>
const PALETTE = ['#ff0000', '#cc0000', '#880000', '#ff6666', '#00ff00', '#00cc00', '#008800', '#66ff66', '#0000ff', '#0000cc', '#000088', '#6666ff', '#ffff00', '#cccc00', '#ffff66', '#ffcc00', '#ff00ff', '#880088', '#00ffff', '#008888', '#ffffff', '#aaaaaa', '#555555', '#000000'];
let teamData = [{ pattern: 'solid', c1: '#ff0000', c2: '#ffffff' }, { pattern: 'solid', c1: '#0000ff', c2: '#ffffff' }];

const W = 1100, TOTAL_H = 850, OFFSET_TOP = 100, H_GAME = 700;
const MID_X = W / 2, MID_Y_GAME = OFFSET_TOP + (H_GAME / 2);
const FIELD_MARGIN_X = 55, GOAL_SIZE = 72; 

let players = Array.from({length: 6}, () => ({ x: -1000, y: -1000, vx: 0, vy: 0, r: 17, m: 6, kick: 0, boostEndTime: 0, boostReadyTime: 0, pwrReadyTime: 0 }));
let ball = { x: MID_X, y: MID_Y_GAME, vx: 0, vy: 0, r: 11, m: 1, isPowered: false };
let score = [0, 0];
let goalMsg = { text: "", timer: 0 };
let isGoalProcessed = false;
const keys = { ax: 0, ay: 0, kick: false, boost: false, pwr: false };
let allRemoteKeys = {}; const rawKeys = {};
const posts = [{x: FIELD_MARGIN_X, y: MID_Y_GAME - GOAL_SIZE, r: 6}, {x: FIELD_MARGIN_X, y: MID_Y_GAME + GOAL_SIZE, r: 6}, {x: W - FIELD_MARGIN_X, y: MID_Y_GAME - GOAL_SIZE, r: 6}, {x: W - FIELD_MARGIN_X, y: MID_Y_GAME + GOAL_SIZE, r: 6}];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(vol = 0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(65, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

const peer = new Peer();
let connections = [], isHost = false, gameStarted = false, activeCount = 1, lastSync = 0, mySlot = 0;

peer.on('open', id => {
    const joinId = new URLSearchParams(window.location.search).get('join');
    if (joinId) { isHost = false; const conn = peer.connect(joinId, { reliable: true }); setupGuest(conn); }
    else { isHost = true; mySlot = 0; document.getElementById('status-text').innerHTML = `Link:<br><input type="text" id="link-input" value="${window.location.origin + window.location.pathname}?join=${id}" readonly onclick="this.select();">`; document.getElementById('slot0').classList.add('active'); document.getElementById('start-btn').style.display = "inline-block"; initColorPickers(); requestAnimationFrame(gameLoop); }
});

peer.on('connection', conn => {
    conn.on('data', data => { 
        if(data.type === 'join') { if (!connections.find(c => c.peer === conn.peer)) { connections.push(conn); conn.send({ type: 'initSlot', slot: connections.length }); refreshLobbyState(); } }
        if(data.type === 'input') { const idx = connections.indexOf(conn) + 1; allRemoteKeys[idx] = data.keys; }
    });
});

function refreshLobbyState() { if(!isHost) return; activeCount = connections.length + 1; updateLobbySlots(); sendToAll({ type: 'lobbyUpdate', count: connections.length, teams: teamData }); }
function updateLobbySlots() { for(let i=0; i<6; i++) { const el = document.getElementById('slot'+i); (i < activeCount) ? el.classList.add('active') : el.classList.remove('active'); } }
function sendToAll(d) { connections.forEach(c => { if(c.open) c.send(d); }); }

function setupGuest(conn) {
    conn.on('open', () => conn.send({ type: 'join' }));
    conn.on('data', data => {
        if (data.type === 'initSlot') mySlot = data.slot;
        if (data.type === 'lobbyUpdate') { activeCount = data.count + 1; teamData = data.teams; updateLobbySlots(); }
        if (data.type === 'start') { gameStarted = true; document.getElementById('menu-overlay').style.display = "none"; }
        if (data.type === 'sync') { ball = data.ball; score = data.score; data.players.forEach((p, i) => { if(players[i]) Object.assign(players[i], p); }); }
        if (data.type === 'goal') { goalMsg = { text: data.text, timer: 120 }; score = data.score; playSound(0.4); }
    });
    function inputLoop() { updateInput(); if(conn.open) conn.send({type:'input', keys}); requestAnimationFrame(inputLoop); }
    inputLoop(); requestAnimationFrame(gameLoop);
}

function initColorPickers() {
    document.getElementById('host-controls').style.display = 'flex';
    [1, 2].forEach(tIdx => {
        ['a', 'b'].forEach(type => {
            const container = document.getElementById(`picker-t${tIdx}-${type}`); container.innerHTML = '';
            PALETTE.forEach(color => {
                const dot = document.createElement('div'); dot.className = 'color-dot' + (teamData[tIdx-1][type === 'a' ? 'c1' : 'c2'] === color ? ' active' : ''); dot.style.backgroundColor = color;
                dot.onclick = () => { teamData[tIdx-1][type === 'a' ? 'c1' : 'c2'] = color; initColorPickers(); refreshLobbyState(); }; container.appendChild(dot);
            });
        });
    });
}

function updateTeams() { teamData[0].pattern = document.getElementById('pattern-t1').value; teamData[1].pattern = document.getElementById('pattern-t2').value; refreshLobbyState(); }
function startGame() { if(isHost){ score = [0, 0]; gameStarted = true; document.getElementById('menu-overlay').style.display="none"; resetPos(); sendToAll({type:'start'}); } }

function resolve(c1, c2, isPost = false) {
    if (!c1 || !c2 || c1.x < -500 || c2.x < -500) return;
    let dx = c2.x - c1.x, dy = c2.y - c1.y, dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < c1.r + c2.r && dist > 0) {
        let nx = dx / dist, ny = dy / dist, overlap = (c1.r + c2.r) - dist;
        if (isPost) { c2.x += nx * overlap; c2.y += ny * overlap; }
        else { c1.x -= nx * overlap * 0.5; c1.y -= ny * overlap * 0.5; c2.x += nx * overlap * 0.5; c2.y += ny * overlap * 0.5; }
        let dot = (c2.vx - (isPost ? 0 : c1.vx))*nx + (c2.vy - (isPost ? 0 : c1.vy))*ny;
        if (dot < 0) {
            let bounce = isPost ? 0.41 : 0.85; 
            let impulse = -(1 + bounce) * dot / (1/(isPost?100:c1.m) + 1/c2.m);
            c2.vx += (impulse * nx) / c2.m; c2.vy += (impulse * ny) / c2.m;
            if (!isPost) { c1.vx -= (impulse * nx) / c1.m; c1.vy -= (impulse * ny) / c1.m; }
            if(c2 === ball || c1 === ball) ball.isPowered = false; 
        }
    }
}

function checkLimits(o, isBall) {
    const limitY_min = OFFSET_TOP + 15, limitY_max = OFFSET_TOP + H_GAME - 15;
    if (isBall) {
        let hitWall = false;
        if (o.y - o.r < limitY_min || o.y + o.r > limitY_max) { o.vy *= -0.54; o.y = o.y < MID_Y_GAME ? limitY_min + o.r : limitY_max - o.r; hitWall = true; }
        if (o.y > MID_Y_GAME - GOAL_SIZE && o.y < MID_Y_GAME + GOAL_SIZE) { if (o.x - o.r < 15) o.x = 15 + o.r; if (o.x + o.r > W - 15) o.x = W - 15 - o.r; } 
        else { if (o.x - o.r < FIELD_MARGIN_X || o.x + o.r > W - FIELD_MARGIN_X) { o.vx *= -0.54; o.x = o.x < MID_X ? FIELD_MARGIN_X + o.r : W - FIELD_MARGIN_X - o.r; hitWall = true; } }
        if(hitWall) ball.isPowered = false;
    } else {
        if (o.y < limitY_min - 5) o.y = limitY_min - 5; if (o.y > limitY_max + 5) o.y = limitY_max + 5;
        if (o.y > MID_Y_GAME - GOAL_SIZE && o.y < MID_Y_GAME + GOAL_SIZE) { if (o.x < FIELD_MARGIN_X) o.x = FIELD_MARGIN_X; if (o.x > W - FIELD_MARGIN_X) o.x = W - FIELD_MARGIN_X; } 
        else { if (o.x < FIELD_MARGIN_X - 5) o.x = FIELD_MARGIN_X - 5; if (o.x > W - FIELD_MARGIN_X + 5) o.x = W - FIELD_MARGIN_X + 5; }
    }
}

function resetPos() {
    isGoalProcessed = false; ball = { x: MID_X, y: MID_Y_GAME, vx: 0, vy: 0, r: 11, m: 1, isPowered: false };
    players.forEach(p => { p.x = -1000; p.y = -1000; p.vx = 0; p.vy = 0; }); 
    if (activeCount >= 1) { players[0].x = FIELD_MARGIN_X + 220; players[0].y = MID_Y_GAME; }
    if (activeCount >= 2) { players[1].x = W - FIELD_MARGIN_X - 220; players[1].y = MID_Y_GAME; }
    if (activeCount >= 3) { players[2].x = FIELD_MARGIN_X + 120; players[2].y = MID_Y_GAME - 150; }
    if (activeCount >= 4) { players[3].x = W - FIELD_MARGIN_X - 120; players[3].y = MID_Y_GAME + 150; }
    if (activeCount >= 5) { players[4].x = FIELD_MARGIN_X + 60; players[4].y = MID_Y_GAME; }
    if (activeCount >= 6) { players[5].x = W - FIELD_MARGIN_X - 60; players[5].y = MID_Y_GAME; }
}

function updateInput() {
    // Reset input
    keys.ax = 0; keys.ay = 0; keys.kick = false; keys.boost = false; keys.pwr = false;

    // --- KEYBOARD INPUT ---
    if (rawKeys['ArrowLeft'] || rawKeys['KeyA']) keys.ax--; if (rawKeys['ArrowRight'] || rawKeys['KeyD']) keys.ax++;
    if (rawKeys['ArrowUp'] || rawKeys['KeyW']) keys.ay--; if (rawKeys['ArrowDown'] || rawKeys['KeyS']) keys.ay++;
    if (rawKeys['Space'] || rawKeys['KeyX']) keys.kick = true;
    if (rawKeys['KeyC'] || rawKeys['KeyQ']) keys.pwr = true;
    if (rawKeys['ShiftLeft'] || rawKeys['ShiftRight']) keys.boost = true;

    // --- GAMEPAD API (360° & Mobile/Bluetooth) ---
    const gamepads = navigator.getGamepads();
    const gp = gamepads[0]; // Prende il primo controller collegato
    if (gp) {
        document.getElementById('gamepad-status').innerText = "Controller Connesso: " + gp.id;
        
        // Stick sinistro (Assi 0 e 1) - Movimento 360 gradi
        const deadzone = 0.1;
        if (Math.abs(gp.axes[0]) > deadzone) keys.ax = gp.axes[0];
        if (Math.abs(gp.axes[1]) > deadzone) keys.ay = gp.axes[1];

        // Pulsanti (Standard mapping)
        if (gp.buttons[0].pressed) keys.kick = true;  // A (Xbox) / Croce (PS)
        if (gp.buttons[2].pressed) keys.pwr = true;   // X (Xbox) / Quadrato (PS)
        if (gp.buttons[5].pressed) keys.boost = true; // RB / R1
    }

    // Normalizzazione per tastiera (evita di andare più veloci in diagonale)
    // Con il Joypad la normalizzazione è naturale data dall'inclinazione
    if (!gp && keys.ax !== 0 && keys.ay !== 0) { 
        const mag = Math.sqrt(keys.ax * keys.ax + keys.ay * keys.ay); 
        keys.ax /= mag; keys.ay /= mag; 
    }
}

function movePlayer(p, input) {
    if(!p || p.x < -500 || goalMsg.timer > 0) return;
    const now = Date.now(); 
    let accel = (now < p.boostEndTime) ? 0.35 : 0.18;
    if (input.boost && now >= p.boostReadyTime) { p.boostEndTime = now + 250; p.boostReadyTime = now + 10000; }
    
    // Applica l'accelerazione basata sull'input (moltiplicata per l'intensità dello stick)
    p.vx += input.ax * accel; p.vy += input.ay * accel; 
    p.vx *= 0.89; p.vy *= 0.89; p.x += p.vx; p.y += p.vy;

    let dx = ball.x - p.x, dy = ball.y - p.y, d = Math.sqrt(dx*dx + dy*dy);
    if (d < p.r + ball.r + 8) {
        if (input.pwr && now >= p.pwrReadyTime) { ball.vx = (dx/d)*6.41; ball.vy = (dy/d)*6.41; ball.isPowered = true; p.kick = 15; p.pwrReadyTime = now + 30000; playSound(0.2); }
        else if (input.kick) { ball.vx = (dx/d)*4.27; ball.vy = (dy/d)*4.27; ball.isPowered = false; p.kick = 15; playSound(0.13); }
    }
    if (p.kick > 0) p.kick--;
}

function gameLoop(t) {
    if (isHost && gameStarted) {
        updateInput(); 
        if (goalMsg.timer <= 0) {
            if (!isGoalProcessed && ball.y > MID_Y_GAME - GOAL_SIZE && ball.y < MID_Y_GAME + GOAL_SIZE) {
                if (ball.x + ball.r < FIELD_MARGIN_X) { isGoalProcessed = true; score[1]++; goalMsg = {text: "GOOOOL!", timer:120}; sendToAll({type:'goal', text:"GOOOOL!", score}); setTimeout(resetPos, 2000); }
                else if (ball.x - ball.r > W - FIELD_MARGIN_X) { isGoalProcessed = true; score[0]++; goalMsg = {text: "GOOOOL!", timer:120}; sendToAll({type:'goal', text:"GOOOOL!", score}); setTimeout(resetPos, 2000); }
            }
            movePlayer(players[0], keys); for(let i=1; i<activeCount; i++) if(allRemoteKeys[i]) movePlayer(players[i], allRemoteKeys[i]);
            ball.vx *= 0.99; ball.vy *= 0.99; ball.x += ball.vx; ball.y += ball.vy;
            if (ball.isPowered && Math.abs(ball.vx) + Math.abs(ball.vy) < 0.5) ball.isPowered = false;
            for(let i=0; i<activeCount; i++) { for(let j=i+1; j<activeCount; j++) resolve(players[i], players[j]); resolve(players[i], ball); posts.forEach(post => resolve(post, players[i], true)); }
            posts.forEach(p => resolve(p, ball, true));
        }
        checkLimits(ball, true); for(let i=0; i<activeCount; i++) checkLimits(players[i], false);
        if (t - lastSync > 16) { sendToAll({ type: 'sync', ball: ball, players: players.slice(0, activeCount), score: score }); lastSync = t; }
    }
    if (goalMsg.timer > 0) goalMsg.timer--;
    draw(); requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', e => rawKeys[e.code] = true);
window.addEventListener('keyup', e => rawKeys[e.code] = false);

// Eventi Gamepad per migliorare la reattività su alcuni browser
window.addEventListener("gamepadconnected", (e) => {
  document.getElementById('gamepad-status').innerText = "Controller Connesso: " + e.gamepad.id;
});

window.addEventListener("gamepaddisconnected", (e) => {
  document.getElementById('gamepad-status').innerText = "Gamepad non rilevato. Premi un tasto sul controller.";
});

function drawPlayer(ctx, p, teamIdx) {
    const data = teamData[teamIdx]; ctx.save(); ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.clip();
    switch(data.pattern) {
        case 'solid': ctx.fillStyle = data.c1; ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2); break;
        case 'h-stripes': for(let i=0; i<4; i++) { ctx.fillStyle = (i % 2 === 0) ? data.c1 : data.c2; ctx.fillRect(p.x - p.r, p.y - p.r + (i * (p.r*2/4)), p.r * 2, p.r*2/4); } break;
        case 'v-stripes': for(let i=0; i<4; i++) { ctx.fillStyle = (i % 2 === 0) ? data.c1 : data.c2; ctx.fillRect(p.x - p.r + (i * (p.r*2/4)), p.y - p.r, p.r*2/4, p.r * 2); } break;
        case 'h-half': ctx.fillStyle = data.c1; ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r); ctx.fillStyle = data.c2; ctx.fillRect(p.x - p.r, p.y, p.r * 2, p.r); break;
        case 'v-half': ctx.fillStyle = data.c1; ctx.fillRect(p.x - p.r, p.y - p.r, p.r, p.r * 2); ctx.fillStyle = data.c2; ctx.fillRect(p.x, p.y - p.r, p.r, p.r * 2); break;
    }
    ctx.restore(); ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    const now = Date.now(); ctx.strokeStyle = (now < p.boostEndTime) ? "#FFEB3B" : (p.kick > 0 ? "#FFF" : "#000");
    ctx.lineWidth = 4; ctx.stroke();
}

function draw() {
    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d'); const now = Date.now();
    ctx.fillStyle = "#2e7d32"; ctx.fillRect(0, 0, W, TOTAL_H);
    
    const fW = W - (FIELD_MARGIN_X * 2), stripeW = fW / 11;
    for (let i = 0; i < 11; i++) { ctx.fillStyle = (i % 2 === 0) ? "#2e7d32" : "#388e3c"; ctx.fillRect(FIELD_MARGIN_X + (i * stripeW), OFFSET_TOP + 15, stripeW, H_GAME - 30); }
    
    ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 3;
    ctx.strokeRect(FIELD_MARGIN_X, OFFSET_TOP+15, W-(FIELD_MARGIN_X*2), H_GAME-30); 
    ctx.beginPath(); ctx.moveTo(MID_X, OFFSET_TOP+15); ctx.lineTo(MID_X, OFFSET_TOP + H_GAME - 15); ctx.stroke();
    ctx.beginPath(); ctx.arc(MID_X, MID_Y_GAME, 90, 0, Math.PI*2); ctx.stroke();
    
    const areaW = 140, areaH = 320;
    ctx.strokeRect(FIELD_MARGIN_X, MID_Y_GAME - areaH/2, areaW, areaH);
    ctx.beginPath(); ctx.arc(FIELD_MARGIN_X + areaW - 30, MID_Y_GAME, 70, -Math.PI*0.37, Math.PI*0.37); ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.beginPath(); ctx.arc(FIELD_MARGIN_X + areaW - 35, MID_Y_GAME, 3, 0, Math.PI*2); ctx.fill(); 
    
    ctx.strokeRect(W - FIELD_MARGIN_X - areaW, MID_Y_GAME - areaH/2, areaW, areaH);
    ctx.beginPath(); ctx.arc(W - FIELD_MARGIN_X - areaW + 30, MID_Y_GAME, 70, Math.PI*0.63, Math.PI*1.37); ctx.stroke();
    ctx.beginPath(); ctx.arc(W - FIELD_MARGIN_X - areaW + 35, MID_Y_GAME, 3, 0, Math.PI*2); ctx.fill(); 
    
    ctx.strokeStyle = "#FFF"; ctx.strokeRect(15, MID_Y_GAME-GOAL_SIZE, FIELD_MARGIN_X-15, GOAL_SIZE*2); ctx.strokeRect(W-FIELD_MARGIN_X, MID_Y_GAME-GOAL_SIZE, FIELD_MARGIN_X-15, GOAL_SIZE*2);
    
    posts.forEach(p => { ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle="#000"; ctx.lineWidth=2; ctx.stroke(); });

    for(let i=0; i<activeCount; i++) {
        const p = players[i]; if (p.x < -500) continue;
        drawPlayer(ctx, p, i % 2);
        ctx.fillStyle = (i === mySlot) ? "yellow" : "white";
        ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center"; ctx.fillText("P" + (i + 1), p.x, p.y - p.r - 10);
    }
    
    ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill(); 
    if (ball.isPowered) { ctx.strokeStyle = "#00FFFF"; ctx.lineWidth = 3; } else { ctx.strokeStyle = "#000"; ctx.lineWidth = 1; }
    ctx.stroke();

    if (goalMsg.timer > 0) { ctx.font = "bold 90px sans-serif"; ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 8; ctx.strokeText(goalMsg.text, MID_X, MID_Y_GAME); ctx.fillText(goalMsg.text, MID_X, MID_Y_GAME); }
    document.getElementById('live-score').innerText = `${score[0]} - ${score[1]}`;
    if (players[mySlot]) {
        const bRem = Math.ceil((players[mySlot].boostReadyTime - now) / 1000);
        const pRem = Math.ceil((players[mySlot].pwrReadyTime - now) / 1000);
        document.getElementById('timer-boost').innerText = "BST: " + (bRem > 0 ? bRem + "s" : "READY");
        document.getElementById('timer-pwr').innerText = "PWR: " + (pRem > 0 ? pRem + "s" : "READY");
    }
}
</script>
</body>
</html>
